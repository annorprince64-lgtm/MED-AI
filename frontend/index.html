    // ==================== UTILITIES ====================
    const generateId = () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    
    const cleanTextForSpeech = (text) => {
      return text
        .replace(/#{1,6}\s+/g, '')
        .replace(/\*\*/g, '')
        .replace(/\*/g, '')
        .replace(/`{1,3}[^`]*`{1,3}/g, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .replace(/\|/g, ', ')
        .replace(/-+/g, '')
        .replace(/\s{2,}/g, ' ')
        .trim();
    };
    
    // Check if mobile
    const isMobile = () => window.innerWidth < 768;
    
    // ==================== STORAGE ====================
    const loadState = () => {
      try {
        const saved = localStorage.getItem('askai-storage-v4');
        return saved ? JSON.parse(saved) : null;
      } catch { return null; }
    };
    
    const saveState = (state) => {
      try {
        localStorage.setItem('askai-storage-v4', JSON.stringify({
          currentUser: state.currentUser,
          isAuthenticated: state.isAuthenticated,
          chats: state.chats,
          currentChatId: state.currentChatId,
          audioEnabled: state.audioEnabled,
          theme: state.theme,
        }));
      } catch {}
    };
    
    // ==================== API ====================
    const api = {
      analyzeText: async (text, conversationHistory = []) => {
        const res = await fetch(`${BACKEND_URL}/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            text,
            conversation_history: conversationHistory 
          }),
        });
        return res.json();
      },
      
      login: async (email, password) => {
        const res = await fetch(`${BACKEND_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        return res.json();
      },
      
      register: async (username, email, password) => {
        const res = await fetch(`${BACKEND_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        return res.json();
      },
      
      updateProfile: async (originalEmail, name, newEmail, currentPassword, newPassword) => {
        const res = await fetch(`${BACKEND_URL}/update-profile`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ originalEmail, name, newEmail, currentPassword, newPassword }),
        });
        return res.json();
      },
      
      loadChats: async (userId) => {
        const res = await fetch(`${BACKEND_URL}/chats/load?user_id=${userId}`);
        return res.json();
      },
      
      saveChat: async (userId, chatData) => {
        await fetch(`${BACKEND_URL}/chats/save`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user_id: userId, chat_data: chatData }),
        });
      },
    };
    
    // ==================== TOAST CONTEXT ====================
    const ToastContext = React.createContext();
    
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = React.useState([]);
      
      const addToast = (title, description, type = 'default') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, title, description, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 3000);
      };
      
      return (
        <ToastContext.Provider value={{ toast: addToast }}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type === 'error' ? 'error' : ''}`}>
                <strong>{t.title}</strong>
                {t.description && <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>{t.description}</div>}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };
    
    const useToast = () => React.useContext(ToastContext);
    
    // ==================== MAIN APP ====================
    function App() {
      const savedState = loadState();
      const { toast } = useToast();
      
      // State
      const [currentUser, setCurrentUser] = React.useState(savedState?.currentUser || null);

      const [chats, setChats] = React.useState(savedState?.chats || {});
      const [currentChatId, setCurrentChatId] = React.useState(savedState?.currentChatId || '');
      const [audioEnabled, setAudioEnabled] = React.useState(savedState?.audioEnabled || false);
      const [theme, setTheme] = React.useState(savedState?.theme || 'dark');
      const [isTyping, setIsTyping] = React.useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false); // Closed by default on all devices
      const [input, setInput] = React.useState('');
      const [isListening, setIsListening] = React.useState(false);
      
      // Modals
      const [showLogin, setShowLogin] = React.useState(false);
      const [showRegister, setShowRegister] = React.useState(false);
      const [showProfile, setShowProfile] = React.useState(false);
      const [showVerification, setShowVerification] = React.useState(false);
      const [showPrivacy, setShowPrivacy] = React.useState(false);
      const [showContact, setShowContact] = React.useState(false);
      const [showAbout, setShowAbout] = React.useState(false);
      
      // Form state
      const [loginEmail, setLoginEmail] = React.useState('');
      const [loginPassword, setLoginPassword] = React.useState('');
      const [registerName, setRegisterName] = React.useState('');
      const [registerEmail, setRegisterEmail] = React.useState('');
      const [registerPassword, setRegisterPassword] = React.useState('');
      const [registerConfirm, setRegisterConfirm] = React.useState('');
      const [verificationInput, setVerificationInput] = React.useState('');
      const [pendingUser, setPendingUser] = React.useState(null);
      const [verificationCode, setVerificationCode] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      
      const messagesEndRef = React.useRef(null);
      const lastSpokenContentRef = React.useRef('');
      const textareaRef = React.useRef(null);
      
      const isDark = theme === 'dark';
      const mobile = isMobile();
      
      // Save state
      React.useEffect(() => {
        saveState({ currentUser, isAuthenticated, chats, currentChatId, audioEnabled, theme });
      }, [currentUser, isAuthenticated, chats, currentChatId, audioEnabled, theme]);
      
      // Initialize chat
      React.useEffect(() => {
        if (!currentChatId || Object.keys(chats).length === 0) {
          const id = createNewChat(true);
          setCurrentChatId(id);
        }
      }, []);
      
      // Scroll to bottom
      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chats[currentChatId]?.messages]);
      
      // Load chats from cloud
      React.useEffect(() => {
        if (currentUser?.id) loadChatsFromCloud();
      }, [currentUser?.id]);
      
      // Save chats to cloud
      React.useEffect(() => {
        if (currentUser?.id && Object.keys(chats).length > 0) {
          const t = setTimeout(() => {
            Object.values(chats).forEach(chat => {
              api.saveChat(currentUser.id, chat).catch(() => {});
            });
          }, 2000);
          return () => clearTimeout(t);
        }
      }, [chats, currentUser?.id]);
      
      // Auto-resize textarea
      React.useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 150) + 'px';
        }
      }, [input]);
      
      const loadChatsFromCloud = async () => {
        if (!currentUser?.id) return;
        try {
          const result = await api.loadChats(currentUser.id);
          if (result.success && result.chats && Object.keys(result.chats).length > 0) {
            setChats(result.chats);
            setCurrentChatId(Object.keys(result.chats)[0]);
          }
        } catch (e) {
          console.error('Failed to load chats:', e);
        }
      };
      
      const createNewChat = (initial = false) => {
        const id = generateId();
        const newChat = {
          id,
          title: 'New Conversation',
          date: new Date().toISOString(),
          messages: [{
            id: generateId(),
            role: 'ai',
            content: "Hello! I'm **ASK AI**, your intelligent assistant created by **Annor Prince** and **Yeboah Collins**. I can help you with questions, tasks, and more.\n\nI remember our conversation, so feel free to ask follow-up questions!\n\nHow can I help you today?",
            timestamp: new Date().toISOString(),
          }],
        };
        setChats(prev => ({ ...prev, [id]: newChat }));
        setCurrentChatId(id);
        if (!initial) setIsSidebarOpen(false);
        return id;
      };
      
      const deleteChat = (chatId) => {
        const chatIds = Object.keys(chats);
        if (chatIds.length <= 1) return;
        const newChats = { ...chats };
        delete newChats[chatId];
        let newCurrentId = currentChatId;
        if (chatId === currentChatId) {
          newCurrentId = Object.keys(newChats)[0];
        }
        setChats(newChats);
        setCurrentChatId(newCurrentId);
      };
      
      const addMessage = (chatId, message) => {
        setChats(prev => ({
          ...prev,
          [chatId]: {
            ...prev[chatId],
            messages: [...prev[chatId].messages, message],
            date: new Date().toISOString(),
          },
        }));
      };
      
      const updateChatTitle = (chatId, title) => {
        setChats(prev => ({
          ...prev,
          [chatId]: { ...prev[chatId], title },
        }));
      };
      
      const clearChat = (chatId) => {
        setChats(prev => ({
          ...prev,
          [chatId]: {
            ...prev[chatId],
            messages: [{
              id: generateId(),
              role: 'ai',
              content: "Hello! I'm your AI assistant. How can I help you today?",
              timestamp: new Date().toISOString(),
            }],
            date: new Date().toISOString(),
          },
        }));
      };
      
      // Build conversation history for context
      const buildConversationHistory = (currentMessages) => {
        // Get last 10 messages for context (excluding the initial greeting)
        const messagesToSend = currentMessages.slice(-11).filter(m => 
          !m.content.includes("Hello! I'm **ASK AI**") && 
          !m.content.includes("Hello! I'm your AI assistant")
        );
        
        return messagesToSend.map(m => ({
          role: m.role,
          content: m.content
        }));
      };
      
      const handleSend = async () => {
        const content = input.trim();
        if (!content || isTyping) return;
        setInput('');
        
        // Close sidebar on mobile after sending
        if (mobile) setIsSidebarOpen(false);
        
        addMessage(currentChatId, {
          id: generateId(),
          role: 'user',
          content,
          timestamp: new Date().toISOString(),
        });
        
        const currentChat = chats[currentChatId];
        if (currentChat && currentChat.messages.length <= 1) {
          updateChatTitle(currentChatId, content.length > 30 ? content.slice(0, 30) + '...' : content);
        }
        
        setIsTyping(true);
        try {
          // Get current messages including the new one
          const updatedChat = chats[currentChatId];
          const allMessages = [...(updatedChat?.messages || []), {
            id: generateId(),
            role: 'user',
            content,
            timestamp: new Date().toISOString(),
          }];
          
          // Build conversation history for context
          const conversationHistory = buildConversationHistory(allMessages);
          
          const response = await api.analyzeText(content, conversationHistory);
          addMessage(currentChatId, {
            id: generateId(),
            role: 'ai',
            content: response.response || 'I could not process your request.',
            timestamp: new Date().toISOString(),
          });
          if (audioEnabled && response.response) {
            speakText(response.response);
          }
        } catch (error) {
          addMessage(currentChatId, {
            id: generateId(),
            role: 'ai',
            content: "I'm having trouble connecting. Please try again.",
            timestamp: new Date().toISOString(),
          });
        } finally {
          setIsTyping(false);
        }
      };
      
      const speakText = (text) => {
        if (!text || typeof window === 'undefined' || !('speechSynthesis' in window)) return;
        const cleanText = cleanTextForSpeech(text);
        if (!cleanText) return;
        lastSpokenContentRef.current = cleanText;
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(cleanText);
        utterance.lang = 'en-US';
        utterance.rate = 0.9;
        window.speechSynthesis.speak(utterance);
      };
      
      const toggleVoice = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          toast('Not Supported', 'Speech recognition not supported in this browser', 'error');
          return;
        }
        if (isListening) {
          window.speechRecognition?.stop();
          setIsListening(false);
        } else {
          const recognition = new SpeechRecognition();
          window.speechRecognition = recognition;
          recognition.continuous = false;
          recognition.interimResults = false;
          recognition.lang = 'en-US';
          recognition.onresult = (e) => {
            setInput(e.results[0][0].transcript);
            setIsListening(false);
          };
          recognition.onerror = () => setIsListening(false);
          recognition.onend = () => setIsListening(false);
          recognition.start();
          setIsListening(true);
        }
      };
      
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const result = await api.login(loginEmail, loginPassword);
          if (result.success && result.user) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowLogin(false);
            setLoginEmail('');
            setLoginPassword('');
            toast('Welcome back!', `Logged in as ${result.user.name}`);
          } else {
            toast('Login Failed', result.error || 'Invalid credentials', 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to connect', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleRegister = async (e) => {
        e.preventDefault();
        if (registerPassword !== registerConfirm) {
          toast('Error', 'Passwords do not match', 'error');
          return;
        }
        if (registerPassword.length < 6) {
          toast('Error', 'Password must be at least 6 characters', 'error');
          return;
        }
        setLoading(true);
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        setVerificationCode(code);
        setPendingUser({ name: registerName, email: registerEmail, password: registerPassword });
        try {
          if (window.emailjs) {
            await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
              to_email: registerEmail,
              verification_code: code,
            });
            setShowRegister(false);
            setShowVerification(true);
            toast('Verification Sent', 'Check your email for the code');
          } else {
            toast('Error', 'Email service not available', 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to send verification email', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleVerify = async () => {
        if (verificationInput !== verificationCode) {
          toast('Error', 'Invalid verification code', 'error');
          return;
        }
        if (!pendingUser) return;
        setLoading(true);
        try {
          const result = await api.register(pendingUser.name, pendingUser.email, pendingUser.password);
          if (result.success && result.user) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowVerification(false);
            setPendingUser(null);
            setVerificationCode('');
            setVerificationInput('');
            toast('Account Created!', 'Welcome to ASK AI!');
          } else {
            toast('Registration Failed', result.error, 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to create account', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleLogout = () => {
        setCurrentUser(null);
        setIsAuthenticated(false);
        // Create a fresh chat for logged out state
        const newId = generateId();
        const freshChat = {
          id: newId,
          title: 'New Conversation',
          date: new Date().toISOString(),
          messages: [{
            id: generateId(),
            role: 'ai',
            content: "Hello! I'm **ASK AI**, your intelligent assistant created by **Annor Prince** and **Yeboah Collins**. I can help you with questions, tasks, and more.\n\nI remember our conversation, so feel free to ask follow-up questions!\n\nHow can I help you today?",
            timestamp: new Date().toISOString(),
          }],
        };
        setChats({ [newId]: freshChat });
        setCurrentChatId(newId);
        setIsSidebarOpen(false);
        toast('Logged out', 'You have been logged out');
      };
      
      const currentChat = chats[currentChatId];
      const messages = currentChat?.messages || [];
      const userInitials = currentUser?.name?.split(' ').map(n => n[0]).join('').toUpperCase() || 'U';
      
      // Group chats
      const groupedChats = Object.values(chats)
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .reduce((groups, chat) => {
          const date = new Date(chat.date);
          const today = new Date();
          const yesterday = new Date(today);
          yesterday.setDate(yesterday.getDate() - 1);
          let key = 'Previous 7 Days';
          if (date.toDateString() === today.toDateString()) key = 'Today';
          else if (date.toDateString() === yesterday.toDateString()) key = 'Yesterday';
          if (!groups[key]) groups[key] = [];
          groups[key].push(chat);
          return groups;
        }, {});
      
      // Theme styles
      const styles = {
        bgMain: isDark ? '#212121' : '#f3f4f6',
        bgSidebar: isDark ? '#171717' : '#ffffff',
        bgSecondary: isDark ? '#2f2f2f' : '#e5e7eb',
        bgHover: isDark ? '#3e3e3e' : '#d1d5db',
        textPrimary: isDark ? '#e5e7eb' : '#1f2937',
        textSecondary: isDark ? '#9ca3af' : '#6b7280',
        borderColor: isDark ? 'rgba(255,255,255,0.05)' : '#e5e7eb',
      };
      
      // Render markdown
      const renderMarkdown = (content) => {
        const processed = content
          .split('\n')
          .map(line => line.trim())
          .join('\n')
          .replace(/<br\s*\/?>/gi, '\n\n');
        return <div dangerouslySetInnerHTML={{ __html: marked.parse(processed) }} />;
      };
      
      // Close sidebar when clicking outside on mobile
      const handleMainClick = () => {
        if (mobile && isSidebarOpen) {
          setIsSidebarOpen(false);
        }
      };
      
      return (
        <div style={{
          display: 'flex', height: '100%', fontFamily: 'sans-serif', overflow: 'hidden',
          background: styles.bgMain, color: styles.textPrimary,
        }}>
          
          {/* Sidebar Overlay for Mobile */}
          {mobile && isSidebarOpen && (
            <div className="sidebar-overlay" onClick={() => setIsSidebarOpen(false)} />
          )}
          
          {/* Sidebar */}
          <div style={{
            position: mobile ? 'fixed' : 'relative',
            left: 0, top: 0, bottom: 0,
            width: mobile ? 280 : (isSidebarOpen ? 260 : 0),
            transition: 'width 0.3s, transform 0.3s',
            transform: mobile ? (isSidebarOpen ? 'translateX(0)' : 'translateX(-100%)') : 'none',
            overflow: 'hidden',
            borderRight: `1px solid ${styles.borderColor}`,
            background: styles.bgSidebar,
            zIndex: mobile ? 50 : 1,
          }}>
            <div style={{ width: mobile ? 280 : 260, padding: 12, display: 'flex', flexDirection: 'column', height: '100%' }}>
              {/* Close button on mobile */}
              {mobile && (
                <button
                  onClick={() => setIsSidebarOpen(false)}
                  style={{
                    position: 'absolute', top: 12, right: 12, padding: 8, borderRadius: 8,
                    background: styles.bgSecondary,
                  }}
                >
                  <Icons.XLarge />
                </button>
              )}
              
              <button
                onClick={() => createNewChat()}
                style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '12px',
                  width: '100%', borderRadius: 12, marginBottom: 16,
                  transition: 'background 0.2s', border: 'none', cursor: 'pointer',
                  background: styles.bgSecondary, color: styles.textPrimary,
                }}
              >
                <div style={{ background: '#10a37f', padding: 4, borderRadius: 6, color: 'white' }}>
                  <Icons.Plus />
                </div>
                <span style={{ fontSize: 14, fontWeight: 500 }}>New Chat</span>
              </button>
              
              <div style={{ flex: 1, overflowY: 'auto' }} className="custom-scrollbar">
                {Object.entries(groupedChats).map(([group, groupChats]) => (
                  <div key={group} style={{ marginBottom: 24 }}>
                    <h3 style={{
                      fontSize: 11, fontWeight: 600, textTransform: 'uppercase',
                      letterSpacing: '0.05em', marginBottom: 8, paddingLeft: 12,
                      color: styles.textSecondary,
                    }}>{group}</h3>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
                      {groupChats.map(chat => (
                        <div
                          key={chat.id}
                          onClick={() => {
                            setCurrentChatId(chat.id);
                            if (mobile) setIsSidebarOpen(false);
                          }}
                          style={{
                            display: 'flex', alignItems: 'center', gap: 12,
                            padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
                            fontSize: 14, border: 'none',
                            background: chat.id === currentChatId ? styles.bgSecondary : 'transparent',
                            color: chat.id === currentChatId ? styles.textPrimary : styles.textSecondary,
                          }}
                        >
                          <Icons.MessageSquare />
                          <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {chat.title}
                          </span>
                          <button
                            onClick={(e) => { e.stopPropagation(); deleteChat(chat.id); }}
                            style={{ padding: 4, opacity: 0.6, border: 'none', background: 'none', cursor: 'pointer' }}
                          >
                            <Icons.X />
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
              
              <div style={{ borderTop: `1px solid ${styles.borderColor}`, paddingTop: 16 }}>
                {isAuthenticated && currentUser ? (
                  <>
                    <button
                      onClick={() => { setShowProfile(true); if (mobile) setIsSidebarOpen(false); }}
                      style={{
                        display: 'flex', alignItems: 'center', gap: 12, width: '100%',
                        padding: '10px 12px', borderRadius: 8, fontSize: 14, border: 'none',
                        background: 'transparent', color: styles.textSecondary, cursor: 'pointer',
                      }}
                    >
                      <div style={{
                        width: 28, height: 28, borderRadius: '50%',
                        background: 'linear-gradient(135deg, #6366f1, #a855f7)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontSize: 10, fontWeight: 'bold', color: 'white',
                      }}>{userInitials}</div>
                      <span style={{ fontWeight: 500, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>
                        {currentUser.name}
                      </span>
                      <Icons.Settings />
                    </button>
                    <button
                      onClick={handleLogout}
                      style={{
                        display: 'flex', alignItems: 'center', gap: 12, width: '100%',
                        padding: '10px 12px', borderRadius: 8, fontSize: 14, border: 'none',
                        background: 'transparent', color: styles.textSecondary, cursor: 'pointer',
                      }}
                    >
                      <Icons.LogOut />
                      <span>Log out</span>
                    </button>
                  </>
                ) : (
                  <button
                    onClick={() => { setShowLogin(true); if (mobile) setIsSidebarOpen(false); }}
                    style={{
                      display: 'flex', alignItems: 'center', gap: 12, width: '100%',
                      padding: '12px 12px', borderRadius: 8, fontSize: 14, border: 'none',
                      background: 'transparent', color: styles.textSecondary, cursor: 'pointer',
                    }}
                  >
                    <div style={{
                      width: 28, height: 28, borderRadius: '50%',
                      background: 'linear-gradient(135deg, #6366f1, #a855f7)',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
                    }}><Icons.User /></div>
                    <span style={{ fontWeight: 500 }}>Sign In</span>
                  </button>
                )}
              </div>
            </div>
          </div>
          
          {/* Main Content */}
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', height: '100%', minWidth: 0 }} onClick={handleMainClick}>
            {/* Header */}
            <header style={{
              height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
              padding: '0 12px', borderBottom: `1px solid ${styles.borderColor}`,
              position: 'sticky', top: 0, zIndex: 30, flexShrink: 0,
              background: isDark ? 'rgba(33,33,33,0.95)' : 'rgba(243,244,246,0.95)',
              backdropFilter: 'blur(12px)',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <button
                  onClick={(e) => { e.stopPropagation(); setIsSidebarOpen(!isSidebarOpen); }}
                  style={{ padding: 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer' }}
                >
                  <Icons.Menu />
                </button>
                <span style={{ fontSize: 18, fontWeight: 600 }}>ASK AI</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                <button
                  onClick={() => setTheme(isDark ? 'light' : 'dark')}
                  style={{ padding: 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer' }}
                >
                  {isDark ? <Icons.Sun /> : <Icons.Moon />}
                </button>
                <button
                  onClick={() => {
                    const newEnabled = !audioEnabled;
                    setAudioEnabled(newEnabled);
                    if (!newEnabled && window.speechSynthesis) {
                      window.speechSynthesis.cancel();
                    }
                  }}
                  style={{ padding: 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer', color: audioEnabled ? '#10a37f' : styles.textSecondary }}
                >
                  {audioEnabled ? <Icons.Volume2 /> : <Icons.VolumeX />}
                </button>
                <button
                  onClick={() => { if (confirm('Clear this conversation?')) clearChat(currentChatId); }}
                  style={{ padding: 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer' }}
                >
                  <Icons.Trash />
                </button>
                <button
                  onClick={() => setShowPrivacy(true)}
                  style={{ padding: 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer' }}
                >
                  <Icons.MoreHorizontal />
                </button>
              </div>
            </header>
            
            {/* Messages */}
            <div style={{ flex: 1, overflowY: 'auto', WebkitOverflowScrolling: 'touch' }} className="custom-scrollbar">
              <div style={{ maxWidth: 768, margin: '0 auto', padding: '24px 16px' }}>
                {messages.map((msg) => (
                  <div key={msg.id} style={{
                    display: 'flex', gap: 12, marginBottom: 24,
                    justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
                  }}>
                    {msg.role === 'ai' && (
                      <div style={{
                        width: 32, height: 32, borderRadius: '50%', background: '#10a37f',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        flexShrink: 0, color: 'white',
                      }}>
                        <Icons.Bot />
                      </div>
                    )}
                    <div style={{ maxWidth: mobile ? '85%' : '80%' }}>
                      <div style={{
                        padding: '12px 16px', borderRadius: 20, fontSize: 15, lineHeight: 1.6,
                        background: msg.role === 'user' ? styles.bgSecondary : 'transparent',
                        color: msg.role === 'user' ? styles.textPrimary : undefined,
                        borderBottomRightRadius: msg.role === 'user' ? 4 : 20,
                        borderBottomLeftRadius: msg.role === 'ai' ? 4 : 20,
                      }} className={msg.role === 'ai' ? (isDark ? 'markdown-dark' : 'markdown-light') : ''}>
                        {msg.role === 'ai' ? renderMarkdown(msg.content) : <span style={{ whiteSpace: 'pre-wrap' }}>{msg.content}</span>}
                      </div>
                      {msg.role === 'ai' && (
                        <div style={{ display: 'flex', gap: 12, marginTop: 8, marginLeft: 4, opacity: 0.7 }}>
                          <button onClick={() => { navigator.clipboard.writeText(msg.content); toast('Copied!'); }}
                                  style={{ padding: 4, border: 'none', background: 'none', cursor: 'pointer' }}>
                            <Icons.Copy />
                          </button>
                          <button onClick={() => speakText(msg.content)} style={{ padding: 4, border: 'none', background: 'none', cursor: 'pointer' }}>
                            <Icons.Volume2 />
                          </button>
                        </div>
                      )}
                    </div>
                    {msg.role === 'user' && (
                      <div style={{
                        width: 32, height: 32, borderRadius: '50%',
                        background: 'linear-gradient(135deg, #6366f1, #a855f7)',
                        display: 'flex', alignItems: 'center', justifyContent: 'center',
                        flexShrink: 0, fontSize: 10, fontWeight: 'bold', color: 'white',
                      }}>{userInitials}</div>
                    )}
                  </div>
                ))}
                {isTyping && (
                  <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                    <div style={{
                      width: 32, height: 32, borderRadius: '50%', background: '#10a37f',
                      display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
                    }}><Icons.Bot /></div>
                    <div style={{ padding: '12px 16px', borderRadius: 20, borderBottomLeftRadius: 4, background: styles.bgSecondary }}>
                      <div style={{ display: 'flex', gap: 4 }}>
                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#9ca3af' }} className="animate-bounce" />
                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#9ca3af' }} className="animate-bounce" />
                        <span style={{ width: 8, height: 8, borderRadius: '50%', background: '#9ca3af' }} className="animate-bounce" />
                      </div>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
            </div>
            
            {/* Input */}
            <div style={{ padding: '0 12px 16px', flexShrink: 0 }} className="safe-bottom">
              <div style={{ maxWidth: 768, margin: '0 auto' }}>
                <div style={{
                  borderRadius: 24, border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                  background: styles.bgSecondary,
                }}>
                  <div style={{ display: 'flex', alignItems: 'flex-end', padding: '8px 12px', gap: 8 }}>
                    <button style={{ padding: 8, borderRadius: '50%', border: 'none', background: 'none', cursor: 'pointer' }}>
                      <Icons.Paperclip />
                    </button>
                    <textarea
                      ref={textareaRef}
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter' && !e.shiftKey) {
                          e.preventDefault();
                          handleSend();
                        }
                      }}
                      placeholder="Message ASK AI..."
                      disabled={isTyping || isListening}
                      style={{
                        flex: 1, background: 'transparent', border: 'none', outline: 'none',
                        padding: '8px 0', resize: 'none', maxHeight: 150, fontSize: 16,
                        color: isDark ? '#fff' : '#111', lineHeight: 1.5,
                      }}
                      rows={1}
                    />
                    <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                      <button
                        onClick={toggleVoice}
                        disabled={isTyping}
                        style={{
                          padding: 8, borderRadius: '50%', border: 'none', background: 'none',
                          color: isListening ? '#ef4444' : styles.textSecondary, cursor: 'pointer',
                        }}
                      >
                        {isListening ? <Icons.MicOff /> : <Icons.Mic />}
                      </button>
                      <button
                        onClick={handleSend}
                        disabled={!input.trim() || isTyping}
                        style={{
                          padding: 10, borderRadius: '50%', border: 'none',
                          background: input.trim() ? '#10a37f' : 'transparent',
                          color: input.trim() ? '#fff' : '#6b7280', cursor: 'pointer',
                        }}
                      >
                        <Icons.Send />
                      </button>
                    </div>
                  </div>
                </div>
                <p style={{ fontSize: 11, textAlign: 'center', marginTop: 12, color: styles.textSecondary, opacity: 0.7 }}>
                  ASK AI can make mistakes. Consider checking important information.
                </p>
              </div>
            </div>
          </div>
          
          {/* Login Modal */}
          {showLogin && (
            <div className="modal-overlay" onClick={() => setShowLogin(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#171717' : '#fff' }}
                   onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowLogin(false)}
                        style={{ position: 'absolute', top: 16, right: 16, opacity: 0.7, border: 'none', background: 'none', cursor: 'pointer' }}>
                  <Icons.XLarge />
                </button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: '50%', margin: '0 auto 12px',
                    background: 'linear-gradient(135deg, #6366f1, #a855f7)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
                  }}><Icons.User /></div>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Welcome back</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Sign in to your account</p>
                </div>
                <form onSubmit={handleLogin} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <div>
                    <label style={{ fontSize: 14 }}>Email</label>
                    <input
                      type="email" value={loginEmail} required
                      onChange={(e) => setLoginEmail(e.target.value)}
                      placeholder="Enter your email"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 14 }}>Password</label>
                    <input
                      type="password" value={loginPassword} required
                      onChange={(e) => setLoginPassword(e.target.value)}
                      placeholder="Enter your password"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <button
                    type="submit" disabled={loading}
                    style={{
                      width: '100%', padding: 14, borderRadius: 12, fontWeight: 500,
                      background: '#10a37f', color: '#fff', border: 'none', fontSize: 16, cursor: 'pointer',
                    }}
                  >
                    {loading ? <Icons.Loader /> : 'Sign in'}
                  </button>
                </form>
                <p style={{ textAlign: 'center', marginTop: 16, fontSize: 14, color: styles.textSecondary }}>
                  Don't have an account?{' '}
                  <button onClick={() => { setShowLogin(false); setShowRegister(true); }}
                          style={{ color: '#10a37f', background: 'none', border: 'none', cursor: 'pointer' }}>
                    Sign up
                  </button>
                </p>
              </div>
            </div>
          )}
          
          {/* Register Modal */}
          {showRegister && (
            <div className="modal-overlay" onClick={() => setShowRegister(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#171717' : '#fff' }}
                   onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowRegister(false)}
                        style={{ position: 'absolute', top: 16, right: 16, opacity: 0.7, border: 'none', background: 'none', cursor: 'pointer' }}>
                  <Icons.XLarge />
                </button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: '50%', margin: '0 auto 12px',
                    background: 'linear-gradient(135deg, #a855f7, #6366f1)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
                  }}><Icons.User /></div>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Create account</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Join ASK AI today</p>
                </div>
                <form onSubmit={handleRegister} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <div>
                    <label style={{ fontSize: 14 }}>Name</label>
                    <input
                      value={registerName} required
                      onChange={(e) => setRegisterName(e.target.value)}
                      placeholder="Your name"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 14 }}>Email</label>
                    <input
                      type="email" value={registerEmail} required
                      onChange={(e) => setRegisterEmail(e.target.value)}
                      placeholder="your@email.com"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 14 }}>Password</label>
                    <input
                      type="password" value={registerPassword} required
                      onChange={(e) => setRegisterPassword(e.target.value)}
                      placeholder="Min 6 characters"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <div>
                    <label style={{ fontSize: 14 }}>Confirm Password</label>
                    <input
                      type="password" value={registerConfirm} required
                      onChange={(e) => setRegisterConfirm(e.target.value)}
                      placeholder="Confirm password"
                      style={{
                        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
                        border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                        background: styles.bgSecondary, fontSize: 16,
                        color: isDark ? '#fff' : '#111',
                      }}
                    />
                  </div>
                  <button
                    type="submit" disabled={loading}
                    style={{
                      width: '100%', padding: 14, borderRadius: 12, fontWeight: 500,
                      background: '#10a37f', color: '#fff', border: 'none', fontSize: 16, marginTop: 8, cursor: 'pointer',
                    }}
                  >
                    {loading ? <Icons.Loader /> : 'Create account'}
                  </button>
                </form>
                <p style={{ textAlign: 'center', marginTop: 16, fontSize: 14, color: styles.textSecondary }}>
                  Already have an account?{' '}
                  <button onClick={() => { setShowRegister(false); setShowLogin(true); }}
                          style={{ color: '#10a37f', background: 'none', border: 'none', cursor: 'pointer' }}>
                    Sign in
                  </button>
                </p>
              </div>
            </div>
          )}
          
          {/* Verification Modal */}
          {showVerification && (
            <div className="modal-overlay" onClick={() => setShowVerification(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#171717' : '#fff' }}
                   onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowVerification(false)}
                        style={{ position: 'absolute', top: 16, right: 16, opacity: 0.7, border: 'none', background: 'none', cursor: 'pointer' }}>
                  <Icons.XLarge />
                </button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <div style={{
                    width: 56, height: 56, borderRadius: '50%', margin: '0 auto 12px',
                    background: '#10a37f',
                    display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
                  }}><Icons.Mail /></div>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Verify your email</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Enter the 6-digit code sent to your email</p>
                </div>
                <div>
                  <input
                    value={verificationInput}
                    onChange={(e) => setVerificationInput(e.target.value.replace(/\D/g, '').slice(0, 6))}
                    placeholder="000000"
                    maxLength={6}
                    style={{
                      width: '100%', padding: '16px', borderRadius: 12, textAlign: 'center',
                      fontSize: 28, letterSpacing: '0.5em',
                      border: `1px solid ${isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db'}`,
                      background: styles.bgSecondary,
                      color: isDark ? '#fff' : '#111',
                    }}
                  />
                  <button
                    onClick={handleVerify}
                    disabled={verificationInput.length !== 6 || loading}
                    style={{
                      width: '100%', padding: 14, borderRadius: 12, fontWeight: 500,
                      background: '#10a37f', color: '#fff', border: 'none', fontSize: 16, marginTop: 16, cursor: 'pointer',
                    }}
                  >
                    {loading ? <Icons.Loader /> : 'Verify'}
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* Profile Modal */}
          {showProfile && (
            <ProfileModal
              onClose={() => setShowProfile(false)}
              currentUser={currentUser}
              setCurrentUser={setCurrentUser}
              isDark={isDark}
              toast={toast}
            />
          )}
          
          {/* Info Modals */}
          {showPrivacy && (
            <InfoModal
              type="privacy"
              onClose={() => setShowPrivacy(false)}
              onContact={() => { setShowPrivacy(false); setShowContact(true); }}
              onAbout={() => { setShowPrivacy(false); setShowAbout(true); }}
              isDark={isDark}
            />
          )}
          {showContact && (
            <InfoModal
              type="contact"
              onClose={() => setShowContact(false)}
              isDark={isDark}
            />
          )}
          {showAbout && (
            <InfoModal
              type="about"
              onClose={() => setShowAbout(false)}
              isDark={isDark}
            />
          )}
        </div>
      );
    }
    
    // ==================== PROFILE MODAL ====================
    function ProfileModal({ onClose, currentUser, setCurrentUser, isDark, toast }) {
      const [name, setName] = React.useState(currentUser?.name || '');
      const [email, setEmail] = React.useState(currentUser?.email || '');
      const [currentPassword, setCurrentPassword] = React.useState('');
      const [newPassword, setNewPassword] = React.useState('');
      const [confirmPassword, setConfirmPassword] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      
      const styles = {
        bgSecondary: isDark ? '#2f2f2f' : '#e5e7eb',
        textSecondary: isDark ? '#9ca3af' : '#6b7280',
        borderColor: isDark ? 'rgba(255,255,255,0.1)' : '#d1d5db',
      };
      
      const inputStyle = {
        width: '100%', marginTop: 6, padding: '12px', borderRadius: 12,
        border: `1px solid ${styles.borderColor}`,
        background: styles.bgSecondary, fontSize: 16,
        color: isDark ? '#fff' : '#111',
      };
      
      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!currentUser) return;
        if (newPassword && newPassword !== confirmPassword) {
          toast('Error', 'Passwords do not match', 'error');
          return;
        }
        setLoading(true);
        try {
          const result = await api.updateProfile(
            currentUser.email, name,
            email !== currentUser.email ? email : undefined,
            currentPassword || undefined, newPassword || undefined
          );
          if (result.success && result.user) {
            setCurrentUser(result.user);
            toast('Updated', 'Profile saved');
            setCurrentPassword('');
            setNewPassword('');
            setConfirmPassword('');
          } else {
            toast('Error', result.error, 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to update', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ '--modal-bg': isDark ? '#171717' : '#fff' }}
               onClick={(e) => e.stopPropagation()}>
            <button onClick={onClose} style={{ position: 'absolute', top: 16, right: 16, opacity: 0.7, border: 'none', background: 'none', cursor: 'pointer' }}>
              <Icons.XLarge />
            </button>
            <div style={{ textAlign: 'center', marginBottom: 24 }}>
              <div style={{
                width: 56, height: 56, borderRadius: '50%', margin: '0 auto 12px',
                background: 'linear-gradient(135deg, #6366f1, #a855f7)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'white',
              }}><Icons.Settings /></div>
              <h2 style={{ fontSize: 20, fontWeight: 600 }}>Profile Settings</h2>
            </div>
            <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              <div>
                <label style={{ fontSize: 14 }}>Name</label>
                <input value={name} onChange={(e) => setName(e.target.value)} style={inputStyle} />
              </div>
              <div>
                <label style={{ fontSize: 14 }}>Email</label>
                <input value={email} onChange={(e) => setEmail(e.target.value)} style={inputStyle} />
              </div>
              <div style={{ borderTop: `1px solid ${styles.borderColor}`, paddingTop: 12, marginTop: 8 }}>
                <p style={{ fontSize: 14, marginBottom: 8, color: styles.textSecondary }}>
                  Change Password (optional)
                </p>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <input type="password" value={currentPassword}
                         onChange={(e) => setCurrentPassword(e.target.value)}
                         placeholder="Current password" style={inputStyle} />
                  <input type="password" value={newPassword}
                         onChange={(e) => setNewPassword(e.target.value)}
                         placeholder="New password" style={inputStyle} />
                  <input type="password" value={confirmPassword}
                         onChange={(e) => setConfirmPassword(e.target.value)}
                         placeholder="Confirm new password" style={inputStyle} />
                </div>
              </div>
              <button
                type="submit" disabled={loading}
                style={{
                  width: '100%', padding: 14, borderRadius: 12, fontWeight: 500,
                  background: '#10a37f', color: '#fff', border: 'none', fontSize: 16, marginTop: 8, cursor: 'pointer',
                }}
              >
                {loading ? <Icons.Loader /> : 'Save Changes'}
              </button>
            </form>
          </div>
        </div>
      );
    }
    
    // ==================== INFO MODAL ====================
    function InfoModal({ type, onClose, onContact, onAbout, isDark }) {
      const styles = {
        bgSecondary: isDark ? '#2f2f2f' : '#e5e7eb',
        textSecondary: isDark ? '#9ca3af' : '#6b7280',
        textMuted: isDark ? '#d1d5db' : '#374151',
        borderColor: isDark ? 'rgba(255,255,255,0.1)' : '#e5e7eb',
      };
      
      const content = {
        privacy: {
          icon: <Icons.Shield />,
          iconBg: 'rgba(59, 130, 246, 0.2)',
          iconColor: '#3b82f6',
          title: 'Privacy Policy',
          body: (
            <>
              <section style={{ marginBottom: 16 }}>
                <h3 style={{ fontWeight: 600, marginBottom: 8 }}>Information We Collect</h3>
                <p style={{ color: styles.textMuted }}>
                  ASK AI collects minimal information to provide your AI assistance experience.
                </p>
                <ul style={{ marginTop: 8, color: styles.textSecondary, paddingLeft: 20 }}>
                  <li>Chat content and conversation history</li>
                  <li>Account information</li>
                  <li>Technical data for security</li>
                </ul>
              </section>
              <section>
                <h3 style={{ fontWeight: 600, marginBottom: 8 }}>Data Security</h3>
                <p style={{ color: styles.textMuted }}>
                  We implement industry-standard security measures. All data is encrypted in transit and at rest.
                </p>
              </section>
            </>
          ),
          buttons: onContact && onAbout ? (
            <div style={{ display: 'flex', gap: 8, marginTop: 16 }}>
              <button onClick={onContact}
                      style={{ flex: 1, padding: 10, borderRadius: 10, fontSize: 14, border: 'none', background: styles.bgSecondary, cursor: 'pointer' }}>
                Contact
              </button>
              <button onClick={onAbout}
                      style={{ flex: 1, padding: 10, borderRadius: 10, fontSize: 14, border: 'none', background: styles.bgSecondary, cursor: 'pointer' }}>
                About
              </button>
            </div>
          ) : null,
        },
        contact: {
          icon: <Icons.Phone />,
          iconBg: 'rgba(16, 163, 127, 0.2)',
          iconColor: '#10a37f',
          title: 'Contact Us',
          body: (
            <>
              {[
                { label: 'Primary', value: '+233 257 477 888' },
                { label: 'Secondary', value: '+233 534 111 407' },
                { label: 'Email', value: 'yeboahcollins754@gmail.com' },
                { label: 'Tech Support', value: 'annorprince64@gmail.com' },
              ].map((c, i) => (
                <div key={i} style={{
                  padding: 12, borderRadius: 10, marginBottom: 8,
                  border: `1px solid ${styles.borderColor}`,
                  background: styles.bgSecondary,
                }}>
                  <p style={{ fontSize: 12, textTransform: 'uppercase', color: styles.textSecondary }}>{c.label}</p>
                  <p style={{ fontSize: 14, marginTop: 2 }}>{c.value}</p>
                </div>
              ))}
              <div style={{
                padding: 12, borderRadius: 10,
                background: 'rgba(16, 163, 127, 0.1)',
                border: '1px solid rgba(16, 163, 127, 0.2)',
              }}>
                <p style={{ fontSize: 14, color: styles.textMuted }}>
                  We typically respond within 24 hours.
                </p>
              </div>
            </>
          ),
        },
        about: {
          icon: <Icons.Heart />,
          iconBg: 'rgba(244, 63, 94, 0.2)',
          iconColor: '#f43f5e',
          title: 'About ASK AI',
          body: (
            <>
              <section style={{ marginBottom: 16 }}>
                <h3 style={{ fontWeight: 600, marginBottom: 8 }}>Our Mission</h3>
                <p style={{ color: styles.textMuted }}>
                  ASK AI is an advanced AI-powered assistant designed to help you with questions, tasks, and more.
                </p>
              </section>
              <section style={{ marginBottom: 16 }}>
                <h3 style={{ fontWeight: 600, marginBottom: 8 }}>Key Features</h3>
                <ul style={{ color: styles.textSecondary, paddingLeft: 20 }}>
                  <li>Conversation memory</li>
                  <li>Multilingual support</li>
                  <li>Voice recognition</li>
                  <li>Secure cloud sync</li>
                  <li>24/7 availability</li>
                </ul>
              </section>
              <div style={{
                padding: 12, borderRadius: 10, textAlign: 'center',
                background: styles.bgSecondary,
              }}>
                <p style={{ fontWeight: 500 }}>Developed by Annor Prince & Collins Yeboah</p>
              </div>
            </>
          ),
        },
      };
      
      const c = content[type];
      
      return (
        <div className="modal-overlay" onClick={onClose}>
          <div className="modal" style={{ '--modal-bg': isDark ? '#171717' : '#fff', maxWidth: 480 }}
               onClick={(e) => e.stopPropagation()}>
            <button onClick={onClose} style={{ position: 'absolute', top: 16, right: 16, opacity: 0.7, border: 'none', background: 'none', cursor: 'pointer' }}>
              <Icons.XLarge />
            </button>
            <div style={{ textAlign: 'center', marginBottom: 16 }}>
              <div style={{
                width: 48, height: 48, borderRadius: '50%', margin: '0 auto 8px',
                background: c.iconBg,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                color: c.iconColor,
              }}>{c.icon}</div>
              <h2 style={{ fontSize: 20, fontWeight: 600 }}>{c.title}</h2>
            </div>
            <div style={{ fontSize: 14 }}>{c.body}</div>
            {c.buttons}
          </div>
        </div>
      );
    }
    
    // ==================== RENDER ====================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  </script>
</body>
</html>
