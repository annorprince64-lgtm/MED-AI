  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #root { height: 100%; }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(128, 128, 128, 0.3); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(128, 128, 128, 0.5); }
    
    @media (max-width: 768px) {
      .custom-scrollbar::-webkit-scrollbar { display: none; }
      .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-bounce { animation: bounce 0.6s ease-in-out infinite; }
    
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    
    @keyframes recording-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
    }
    .recording-pulse { animation: recording-pulse 1.5s infinite; }
    
    .markdown-dark { color: #e5e7eb; line-height: 1.7; font-size: 15px; word-wrap: break-word; overflow-wrap: break-word; }
    .markdown-dark p { margin: 0 0 1em 0; }
    .markdown-dark h1 { font-size: 1.5em; font-weight: 700; color: #fff; margin: 0.8em 0 0.4em 0; }
    .markdown-dark h2 { font-size: 1.3em; font-weight: 600; color: #fff; margin: 0.7em 0 0.4em 0; }
    .markdown-dark h3 { font-size: 1.1em; font-weight: 600; color: #d1d5db; margin: 0.6em 0 0.3em 0; }
    .markdown-dark ul { list-style-type: disc; margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-dark ol { list-style-type: decimal; margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-dark li { margin: 0.25em 0; color: #e5e7eb; }
    .markdown-dark li::marker { color: #9ca3af; }
    .markdown-dark strong { font-weight: 600; color: #fff; }
    .markdown-dark code { background: rgba(255,255,255,0.1); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; color: #d1d5db; word-break: break-word; }
    .markdown-dark pre { background: rgba(0,0,0,0.3); padding: 1em; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
    .markdown-dark pre code { background: none; padding: 0; }
    .markdown-dark blockquote { border-left: 3px solid #666; padding-left: 1em; margin: 0.5em 0; color: #9ca3af; }
    .markdown-dark table { width: 100%; border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
    .markdown-dark th { padding: 0.6em 1em; text-align: left; font-weight: 600; color: #d1d5db; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); }
    .markdown-dark td { padding: 0.6em 1em; border: 1px solid rgba(255,255,255,0.1); color: #e5e7eb; }
    .markdown-dark tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    .markdown-dark a { color: #fff; text-decoration: underline; }
    
    .markdown-light { color: #374151; line-height: 1.7; font-size: 15px; word-wrap: break-word; overflow-wrap: break-word; }
    .markdown-light p { margin: 0 0 1em 0; }
    .markdown-light h1 { font-size: 1.5em; font-weight: 700; color: #111827; margin: 0.8em 0 0.4em 0; }
    .markdown-light h2 { font-size: 1.3em; font-weight: 600; color: #111827; margin: 0.7em 0 0.4em 0; }
    .markdown-light h3 { font-size: 1.1em; font-weight: 600; color: #374151; margin: 0.6em 0 0.3em 0; }
    .markdown-light ul { list-style-type: disc; margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-light ol { list-style-type: decimal; margin: 0.5em 0; padding-left: 1.5em; }
    .markdown-light li { margin: 0.25em 0; color: #374151; }
    .markdown-light li::marker { color: #6b7280; }
    .markdown-light strong { font-weight: 600; color: #111827; }
    .markdown-light code { background: rgba(0,0,0,0.05); padding: 0.15em 0.4em; border-radius: 4px; font-size: 0.9em; color: #374151; word-break: break-word; }
    .markdown-light pre { background: rgba(0,0,0,0.05); padding: 1em; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
    .markdown-light pre code { background: none; padding: 0; }
    .markdown-light blockquote { border-left: 3px solid #999; padding-left: 1em; margin: 0.5em 0; color: #6b7280; }
    .markdown-light table { width: 100%; border-collapse: collapse; margin: 1em 0; display: block; overflow-x: auto; }
    .markdown-light th { padding: 0.6em 1em; text-align: left; font-weight: 600; color: #374151; border: 1px solid rgba(0,0,0,0.1); background: rgba(0,0,0,0.03); }
    .markdown-light td { padding: 0.6em 1em; border: 1px solid rgba(0,0,0,0.1); color: #374151; }
    .markdown-light tr:nth-child(even) { background: rgba(0,0,0,0.02); }
    .markdown-light a { color: #111; text-decoration: underline; }
    
    .toast-container { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; width: calc(100% - 32px); max-width: 400px; }
    .toast { background: #333; color: #fff; padding: 12px 20px; border-radius: 12px; margin-top: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); animation: slideUp 0.3s ease; text-align: center; border: 1px solid #555; }
    .toast.error { background: #444; border-color: #666; }
    .toast.success { background: #2d5a27; border-color: #3d7a37; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 16px; backdrop-filter: blur(4px); }
    .modal { background: var(--modal-bg); border-radius: 20px; padding: 24px; max-width: 400px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; border: 1px solid rgba(255,255,255,0.1); }
    
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
    }
    
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 45; }
    button { touch-action: manipulation; }
    input, textarea { font-size: 16px; }
    
    @media (max-width: 768px) {
      .modal { max-height: 90vh; padding: 20px; margin: 8px; }
      .modal-overlay { padding: 8px; align-items: flex-start; padding-top: 40px; }
    }
    
    .stop-button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      color: #ef4444;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .stop-button:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    .voice-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      color: #ef4444;
      font-size: 13px;
    }
    
    .voice-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: recording-pulse 1.5s infinite;
    }
    
    .audio-wave {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 16px;
    }
    .audio-wave span {
      width: 3px;
      background: currentColor;
      border-radius: 3px;
      animation: wave 1s ease-in-out infinite;
    }
    .audio-wave span:nth-child(1) { animation-delay: 0s; height: 40%; }
    .audio-wave span:nth-child(2) { animation-delay: 0.1s; height: 70%; }
    .audio-wave span:nth-child(3) { animation-delay: 0.2s; height: 100%; }
    .audio-wave span:nth-child(4) { animation-delay: 0.3s; height: 70%; }
    .audio-wave span:nth-child(5) { animation-delay: 0.4s; height: 40%; }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.5); }
    }
  </style>
</head>

<body>

  <script type="text/babel">
    // =====================================================

    const CONFIG = {

      EMAILJS_SERVICE_ID: 'service_zjhyid5',

    if (window.emailjs) window.emailjs.init(CONFIG.EMAILJS_PUBLIC_KEY);
    
    // =====================================================
    // ICONS
    // =====================================================
    const Icons = {
      Plus: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>,
      MessageSquare: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>,
      Send: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z"/></svg>,
      Mic: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 19v3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><rect x="9" y="2" width="6" height="13" rx="3"/></svg>,
      MicOff: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>,
      Square: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>,
      Settings: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
      X: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      XLarge: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>,
      Loader: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      User: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      Bot: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="10" x="3" y="11" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" x2="8" y1="16" y2="16"/><line x1="16" x2="16" y1="16" y2="16"/></svg>,
      Copy: () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>,
      Sun: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
      Moon: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>,
      Menu: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>,
      LogOut: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16,17 21,12 16,7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>,
      Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      Paperclip: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg>,
      Check: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
      FileText: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14,2 14,8 20,8"/></svg>,
    };
    
    // =====================================================
    // UTILITIES
    // =====================================================
    const Utils = {
      generateId: () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
      isMobile: () => window.innerWidth < 768,
      formatFileSize: (bytes) => {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      },
      getFileExtension: (filename) => filename.split('.').pop().toLowerCase(),
      getFileCategory: (filename) => {
        const ext = Utils.getFileExtension(filename);
        if (['pdf'].includes(ext)) return 'pdf';
        if (['docx', 'doc'].includes(ext)) return 'docx';
        if (['png', 'jpg', 'jpeg', 'gif', 'webp'].includes(ext)) return 'image';
        if (['txt', 'md', 'csv'].includes(ext)) return 'txt';
        return 'unknown';
      },
    };
    
    // =====================================================
    // STORAGE
    // =====================================================
    const Storage = {
      KEY: 'askai-storage-v11',
      load: () => { try { const s = localStorage.getItem(Storage.KEY); return s ? JSON.parse(s) : null; } catch { return null; } },
      save: (state) => { try { localStorage.setItem(Storage.KEY, JSON.stringify({ currentUser: state.currentUser, isAuthenticated: state.isAuthenticated, chats: state.chats, currentChatId: state.currentChatId, theme: state.theme })); } catch {} },
      clear: () => { try { localStorage.removeItem(Storage.KEY); } catch {} },
    };
    
    // =====================================================
    // API WITH ABORT SUPPORT
    // =====================================================
    const API = {
      activeControllers: new Map(),
      
      createAbortController: (requestId) => {
        const controller = new AbortController();
        API.activeControllers.set(requestId, controller);
        return controller;
      },
      
      abortRequest: (requestId) => {
        const controller = API.activeControllers.get(requestId);
        if (controller) { controller.abort(); API.activeControllers.delete(requestId); return true; }
        return false;
      },
      
      isAborted: (error) => error.name === 'AbortError',
      
      analyzeText: async (text, conversationHistory = [], attachment = null, requestId = null) => {
        const controller = requestId ? API.createAbortController(requestId) : null;
        try {
          const body = { text, conversation_history: conversationHistory };
          if (attachment) body.attachment = attachment;
          const res = await fetch(`${CONFIG.BACKEND_URL}/analyze`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body), signal: controller?.signal
          });
          if (requestId) API.activeControllers.delete(requestId);
          return res.json();
        } catch (error) { if (requestId) API.activeControllers.delete(requestId); throw error; }
      },
      
      login: async (email, password) => { const res = await fetch(`${CONFIG.BACKEND_URL}/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) }); return res.json(); },
      register: async (username, email, password) => { const res = await fetch(`${CONFIG.BACKEND_URL}/register`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, email, password }) }); return res.json(); },
      updateProfile: async (originalEmail, name, newEmail, currentPassword, newPassword) => { const res = await fetch(`${CONFIG.BACKEND_URL}/update-profile`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ originalEmail, name, newEmail, currentPassword, newPassword }) }); return res.json(); },
      deleteAccount: async (email, password) => { const res = await fetch(`${CONFIG.BACKEND_URL}/delete-account`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) }); return res.json(); },
      loadChats: async (userId) => { const res = await fetch(`${CONFIG.BACKEND_URL}/chats/load?user_id=${userId}`); return res.json(); },
      saveChat: async (userId, chatData) => { await fetch(`${CONFIG.BACKEND_URL}/chats/save`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ user_id: userId, chat_data: chatData }) }); },
      checkEmail: async (email) => { const res = await fetch(`${CONFIG.BACKEND_URL}/check-email`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) }); return res.json(); },
      resetPassword: async (email, new_password) => { const res = await fetch(`${CONFIG.BACKEND_URL}/reset-password`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, new_password }) }); return res.json(); },
    };
    
    // =====================================================
    // TOAST CONTEXT
    // =====================================================
    const ToastContext = React.createContext();
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = React.useState([]);
      const addToast = (title, description, type = 'default') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, title, description, type }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
      };
      return (
        <ToastContext.Provider value={{ toast: addToast }}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type === 'error' ? 'error' : ''} ${t.type === 'success' ? 'success' : ''}`}>
                <strong>{t.title}</strong>
                {t.description && <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>{t.description}</div>}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };
    const useToast = () => React.useContext(ToastContext);
    
    // =====================================================
    // MAIN APPLICATION
    // =====================================================
    function App() {
      const savedState = Storage.load();
      const { toast } = useToast();
      
      // State
      const [currentUser, setCurrentUser] = React.useState(savedState?.currentUser || null);
      const [isAuthenticated, setIsAuthenticated] = React.useState(savedState?.isAuthenticated || false);
      const [chats, setChats] = React.useState(savedState?.chats || {});
      const [currentChatId, setCurrentChatId] = React.useState(savedState?.currentChatId || '');
      const [theme, setTheme] = React.useState(savedState?.theme || 'dark');
      const [isTyping, setIsTyping] = React.useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [input, setInput] = React.useState('');
      const [isListening, setIsListening] = React.useState(false);
      const [abortRequestId, setAbortRequestId] = React.useState(null);
      const [selectedFiles, setSelectedFiles] = React.useState([]);
      
      // Modals
      const [showLogin, setShowLogin] = React.useState(false);
      const [showRegister, setShowRegister] = React.useState(false);
      const [showProfile, setShowProfile] = React.useState(false);
      const [showVerification, setShowVerification] = React.useState(false);
      const [showForgotPassword, setShowForgotPassword] = React.useState(false);
      const [showResetPassword, setShowResetPassword] = React.useState(false);
      
      // Form states
      const [loginEmail, setLoginEmail] = React.useState('');
      const [loginPassword, setLoginPassword] = React.useState('');
      const [registerName, setRegisterName] = React.useState('');
      const [registerEmail, setRegisterEmail] = React.useState('');
      const [registerPassword, setRegisterPassword] = React.useState('');
      const [registerConfirm, setRegisterConfirm] = React.useState('');
      const [verificationInput, setVerificationInput] = React.useState('');
      const [pendingUser, setPendingUser] = React.useState(null);
      const [verificationCode, setVerificationCode] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [recoveryEmail, setRecoveryEmail] = React.useState('');
      const [recoveryCode, setRecoveryCode] = React.useState('');
      const [recoveryCodeInput, setRecoveryCodeInput] = React.useState('');
      const [newPassword, setNewPassword] = React.useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = React.useState('');
      
      // Refs
      const messagesEndRef = React.useRef(null);
      const textareaRef = React.useRef(null);
      const fileInputRef = React.useRef(null);
      const recognitionRef = React.useRef(null);
      
      // Derived
      const isDark = theme === 'dark';
      const mobile = Utils.isMobile();
      const currentChat = chats[currentChatId];
      const messages = currentChat?.messages || [];
      const userInitials = currentUser?.name?.split(' ').map(n => n[0]).join('').toUpperCase() || 'U';
      
      // Styles
      const styles = {
        bgPrimary: isDark ? '#171717' : '#f5f5f5',
        bgSecondary: isDark ? '#262626' : '#ffffff',
        bgTertiary: isDark ? '#333333' : '#e5e5e5',
        textPrimary: isDark ? '#ffffff' : '#171717',
        textSecondary: isDark ? '#a3a3a3' : '#525252',
        borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
        accentColor: isDark ? '#3b82f6' : '#2563eb',
        buttonPrimary: isDark ? '#ffffff' : '#171717',
        buttonPrimaryText: isDark ? '#171717' : '#ffffff',
      };
      
      // Effects
      React.useEffect(() => { Storage.save({ currentUser, isAuthenticated, chats, currentChatId, theme }); }, [currentUser, isAuthenticated, chats, currentChatId, theme]);
      React.useEffect(() => { if (!currentChatId || Object.keys(chats).length === 0) { const id = createNewChat(true); setCurrentChatId(id); } }, []);
      React.useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [chats[currentChatId]?.messages]);
      React.useEffect(() => { if (currentUser?.id) loadChatsFromCloud(); }, [currentUser?.id]);
      React.useEffect(() => { if (currentUser?.id && Object.keys(chats).length > 0) { const t = setTimeout(() => { Object.values(chats).forEach(chat => { API.saveChat(currentUser.id, chat).catch(() => {}); }); }, 2000); return () => clearTimeout(t); } }, [chats, currentUser?.id]);
      React.useEffect(() => { if (textareaRef.current) { textareaRef.current.style.height = 'auto'; textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 150) + 'px'; } }, [input]);
      
      // Functions
      const loadChatsFromCloud = async () => {
        if (!currentUser?.id) return;
        try {
          const result = await API.loadChats(currentUser.id);
          if (result.success && result.chats && Object.keys(result.chats).length > 0) {
            setChats(result.chats);
            setCurrentChatId(Object.keys(result.chats)[0]);
          }
        } catch (e) { console.error('Failed to load chats:', e); }
      };
      
      const createNewChat = (initial = false) => {
        const id = Utils.generateId();
        const newChat = {
          id, title: 'New Conversation', date: new Date().toISOString(),
          messages: [{
            id: Utils.generateId(), role: 'ai',
            content: `Hello! I'm **ASK AI**, your intelligent assistant created by **${CONFIG.DEVELOPERS[0]}** and **${CONFIG.DEVELOPERS[1]}**.\n\nI can help you with:\n- 📄 **Document Analysis** - Upload PDFs, DOCX, or images\n- 💬 **Questions & Answers** - Ask me anything\n- 📝 **Writing & Editing** - I can help write or improve text\n- 🔍 **Research** - I can explain complex topics\n\nHow can I help you today?`,
            timestamp: new Date().toISOString(),
          }],
        };
        setChats(prev => ({ ...prev, [id]: newChat }));
        setCurrentChatId(id);
        if (!initial) setIsSidebarOpen(false);
        return id;
      };
      
      const deleteChat = (chatId) => {
        const chatIds = Object.keys(chats);
        if (chatIds.length <= 1) return;
        const newChats = { ...chats };
        delete newChats[chatId];
        let newCurrentId = currentChatId;
        if (chatId === currentChatId) newCurrentId = Object.keys(newChats)[0];
        setChats(newChats);
        setCurrentChatId(newCurrentId);
      };
      
      const addMessage = (chatId, message) => {
        setChats(prev => ({ ...prev, [chatId]: { ...prev[chatId], messages: [...prev[chatId].messages, message], date: new Date().toISOString() } }));
      };
      
      const updateChatTitle = (chatId, title) => {
        setChats(prev => ({ ...prev, [chatId]: { ...prev[chatId], title } }));
      };
      
      const buildConversationHistory = (currentMessages) => {
        return currentMessages.slice(-11).filter(m => !m.content.includes("Hello! I'm **ASK AI**")).map(m => ({ role: m.role, content: m.content }));
      };
      
      // Stop AI generation
      const handleStopGeneration = () => {
        if (abortRequestId) {
          API.abortRequest(abortRequestId);
          setAbortRequestId(null);
          setIsTyping(false);
          addMessage(currentChatId, { id: Utils.generateId(), role: 'ai', content: '*Generation stopped by user.*', timestamp: new Date().toISOString() });
          toast('Stopped', 'AI generation stopped', 'default');
        }
      };
      
      // Voice to Text (Speech Recognition) - adds transcribed text to chat input
      const toggleVoiceInput = () => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
          toast('Not Supported', 'Speech recognition is not supported in this browser. Try Chrome or Edge.', 'error');
          return;
        }
        
        if (isListening) {
          // Stop listening
          if (recognitionRef.current) {
            recognitionRef.current.stop();
          }
          setIsListening(false);
          return;
        }
        
        // Start listening
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        
        let finalTranscript = '';
        
        recognition.onstart = () => {
          setIsListening(true);
          toast('Listening...', 'Speak now, your voice will be converted to text', 'default');
        };
        
        recognition.onresult = (event) => {
          let interimTranscript = '';
          
          for (let i = event.resultIndex; i < event.results.length; i++) {
            const transcript = event.results[i][0].transcript;
            if (event.results[i].isFinal) {
              finalTranscript += transcript + ' ';
            } else {
              interimTranscript += transcript;
            }
          }
          
          // Update input with transcribed text
          setInput(prev => {
            const newText = finalTranscript + interimTranscript;
            return prev ? prev + ' ' + newText : newText;
          });
        };
        
        recognition.onerror = (event) => {
          console.error('Speech recognition error:', event.error);
          setIsListening(false);
          if (event.error !== 'aborted') {
            toast('Recognition Error', `Error: ${event.error}`, 'error');
          }
        };
        
        recognition.onend = () => {
          setIsListening(false);
          if (finalTranscript) {
            toast('Text Added', 'Your speech has been converted to text', 'success');
          }
        };
        
        recognitionRef.current = recognition;
        recognition.start();
      };
      
      // File handling
      const handleFileSelect = async (e) => {
        const files = Array.from(e.target.files);
        const processed = [];
        for (const file of files) {
          if (file.size > CONFIG.MAX_FILE_SIZE) { toast('File Too Large', `${file.name} exceeds 50MB`, 'error'); continue; }
          const category = Utils.getFileCategory(file.name);
          if (category === 'unknown') { toast('Unsupported Format', `${file.name} not supported`, 'error'); continue; }
          try {
            const base64 = await new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = () => resolve(reader.result);
              reader.onerror = reject;
              reader.readAsDataURL(file);
            });
            processed.push({ name: file.name, type: file.type, size: file.size, category, data: base64 });
          } catch (e) { toast('Error', `Failed to read ${file.name}`, 'error'); }
        }
        setSelectedFiles(prev => [...prev, ...processed]);
        if (processed.length > 0) toast('Files Added', `${processed.length} file(s) ready to send`, 'success');
      };
      
      const removeFile = (index) => setSelectedFiles(prev => prev.filter((_, i) => i !== index));
      const clearFiles = () => setSelectedFiles([]);
      
      // Send message
      const handleSend = async () => {
        const content = input.trim();
        if ((!content && selectedFiles.length === 0) || isTyping) return;
        setInput('');
        
        if (mobile) setIsSidebarOpen(false);
        
        let messageContent = content;
        let attachmentData = null;
        
        if (selectedFiles.length > 0) {
          const file = selectedFiles[0];
          attachmentData = { name: file.name, type: file.type, data: file.data };
          messageContent += `\n\n[Attached: ${file.name}]`;
          clearFiles();
        }
        
        addMessage(currentChatId, { id: Utils.generateId(), role: 'user', content: messageContent, timestamp: new Date().toISOString() });
        
        const currentChat = chats[currentChatId];
        if (currentChat && currentChat.messages.length <= 1) {
          updateChatTitle(currentChatId, content.length > 30 ? content.slice(0, 30) + '...' : content);
        }
        
        setIsTyping(true);
        const requestId = Utils.generateId();
        setAbortRequestId(requestId);
        
        try {
          const updatedChat = chats[currentChatId];
          const allMessages = [...(updatedChat?.messages || []), { id: Utils.generateId(), role: 'user', content, timestamp: new Date().toISOString() }];
          const conversationHistory = buildConversationHistory(allMessages);
          
          const response = await API.analyzeText(content, conversationHistory, attachmentData, requestId);
          
          if (response.response || response.error) {
            addMessage(currentChatId, { id: Utils.generateId(), role: 'ai', content: response.response || response.error || 'I could not process your request.', timestamp: new Date().toISOString() });
          }
        } catch (error) {
          if (!API.isAborted(error)) {
            addMessage(currentChatId, { id: Utils.generateId(), role: 'ai', content: "I'm having trouble connecting. Please try again.", timestamp: new Date().toISOString() });
          }
        } finally {
          setIsTyping(false);
          setAbortRequestId(null);
        }
      };
      
      // Authentication
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const result = await API.login(loginEmail, loginPassword);
          if (result.success && result.user) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowLogin(false);
            setLoginEmail('');
            setLoginPassword('');
            toast('Welcome back!', `Logged in as ${result.user.name}`, 'success');
          } else {
            toast('Login Failed', result.error || 'Invalid credentials', 'error');
          }
        } catch (e) { toast('Error', 'Failed to connect', 'error'); }
        finally { setLoading(false); }
      };
      
      const handleRegister = async (e) => {
        e.preventDefault();
        if (registerPassword !== registerConfirm) { toast('Error', 'Passwords do not match', 'error'); return; }
        if (registerPassword.length < 6) { toast('Error', 'Password must be at least 6 characters', 'error'); return; }
        setLoading(true);
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        setVerificationCode(code);
        setPendingUser({ name: registerName, email: registerEmail, password: registerPassword });
        try {
          if (window.emailjs) {
            await window.emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, { to_email: registerEmail, verification_code: code });
            setShowRegister(false);
            setShowVerification(true);
            toast('Verification Sent', 'Check your email for the code', 'success');
          } else { toast('Error', 'Email service not available', 'error'); }
        } catch (e) { toast('Error', 'Failed to send verification email', 'error'); }
        finally { setLoading(false); }
      };
      
      const handleVerify = async () => {
        if (verificationInput !== verificationCode) { toast('Error', 'Invalid verification code', 'error'); return; }
        if (!pendingUser) return;
        setLoading(true);
        try {
          const result = await API.register(pendingUser.name, pendingUser.email, pendingUser.password);
          if (result.success) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowVerification(false);
            setPendingUser(null);
            setVerificationInput('');
            toast('Account Created!', 'Welcome to ASK AI', 'success');
          } else { toast('Registration Failed', result.error, 'error'); }
        } catch (e) { toast('Error', 'Registration failed', 'error'); }
        finally { setLoading(false); }
      };
      
      const handleLogout = () => {
        setCurrentUser(null);
        setIsAuthenticated(false);
        Storage.clear();
        toast('Logged Out', 'See you next time!', 'success');
      };
      
      const handleDeleteAccount = async () => {
        if (!currentUser) return;
        setLoading(true);
        try {
          const result = await API.deleteAccount(currentUser.email, loginPassword);
          if (result.success) {
            setCurrentUser(null);
            setIsAuthenticated(false);
            setShowProfile(false);
            Storage.clear();
            toast('Account Deleted', 'Your account has been removed', 'success');
          } else { toast('Error', result.error, 'error'); }
        } catch (e) { toast('Error', 'Failed to delete account', 'error'); }
        finally { setLoading(false); }
      };
      
      // Render message content with markdown
      const renderMessage = (content) => {
        if (typeof marked !== 'undefined') {
          return <div className={isDark ? 'markdown-dark' : 'markdown-light'} dangerouslySetInnerHTML={{ __html: marked.parse(content) }} />;
        }
        return <div className={isDark ? 'markdown-dark' : 'markdown-light'}>{content}</div>;
      };
      
      // Main render
      return (
        <div style={{ height: '100%', background: styles.bgPrimary, color: styles.textPrimary, display: 'flex', flexDirection: 'column' }}>
          {/* Sidebar Overlay */}
          {isSidebarOpen && mobile && <div className="sidebar-overlay" onClick={() => setIsSidebarOpen(false)} />}
          
          {/* Header */}
          <header style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: mobile ? '12px 16px' : '16px 24px', borderBottom: `1px solid ${styles.borderColor}`, background: styles.bgSecondary }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} style={{ padding: mobile ? 8 : 10, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer', color: styles.textPrimary }}>
                <Icons.Menu />
              </button>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: 'linear-gradient(135deg, #3b82f6, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <span style={{ fontSize: 18 }}>🤖</span>
                </div>
                <span style={{ fontWeight: 600, fontSize: 18 }}>{CONFIG.APP_NAME}</span>
              </div>
            </div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <button onClick={() => setTheme(isDark ? 'light' : 'dark')} style={{ padding: 8, borderRadius: 8, border: 'none', background: 'none', cursor: 'pointer', color: styles.textPrimary }}>
                {isDark ? <Icons.Sun /> : <Icons.Moon />}
              </button>
              {isAuthenticated ? (
                <button onClick={() => setShowProfile(true)} style={{ width: 36, height: 36, borderRadius: '50%', background: styles.accentColor, color: '#fff', border: 'none', cursor: 'pointer', fontSize: 14, fontWeight: 600 }}>
                  {userInitials}
                </button>
              ) : (
                <button onClick={() => setShowLogin(true)} style={{ padding: '8px 16px', borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 14 }}>
                  Sign In
                </button>
              )}
            </div>
          </header>
          
          {/* Main Content */}
          <div style={{ flex: 1, display: 'flex', overflow: 'hidden', position: 'relative' }}>
            {/* Sidebar */}
            <aside style={{
              position: mobile ? 'fixed' : 'relative',
              left: mobile ? (isSidebarOpen ? 0 : -280) : 0,
              top: mobile ? 0 : 0,
              height: '100%',
              width: 280,
              background: styles.bgSecondary,
              borderRight: `1px solid ${styles.borderColor}`,
              zIndex: mobile ? 50 : 'auto',
              transition: mobile ? 'left 0.3s ease' : 'none',
              display: 'flex', flexDirection: 'column',
            }}>
              <div style={{ padding: 16 }}>
                <button onClick={() => createNewChat()} style={{ width: '100%', padding: '12px 16px', borderRadius: 12, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, fontWeight: 500 }}>
                  <Icons.Plus /> New Chat
                </button>
              </div>
              <div style={{ flex: 1, overflowY: 'auto', padding: '0 12px' }} className="custom-scrollbar">
                {Object.values(chats).map(chat => (
                  <div key={chat.id} onClick={() => { setCurrentChatId(chat.id); if (mobile) setIsSidebarOpen(false); }} style={{ padding: '10px 12px', borderRadius: 8, cursor: 'pointer', marginBottom: 4, background: chat.id === currentChatId ? styles.bgTertiary : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 8 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8, flex: 1, minWidth: 0 }}>
                      <Icons.MessageSquare />
                      <span style={{ fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{chat.title}</span>
                    </div>
                    {Object.keys(chats).length > 1 && (
                      <button onClick={(e) => { e.stopPropagation(); deleteChat(chat.id); }} style={{ padding: 6, opacity: 0.6, border: 'none', background: 'none', cursor: 'pointer', color: styles.textPrimary }}>
                        <Icons.Trash />
                      </button>
                    )}
                  </div>
                ))}
              </div>
            </aside>
            
            {/* Chat Area */}
            <main style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
              {/* Messages */}
              <div style={{ flex: 1, overflowY: 'auto', padding: mobile ? 16 : 24 }} className="custom-scrollbar">
                {messages.map((msg) => (
                  <div key={msg.id} style={{ marginBottom: 16, display: 'flex', gap: 12 }}>
                    <div style={{ width: 32, height: 32, borderRadius: '50%', background: msg.role === 'user' ? styles.accentColor : styles.bgTertiary, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                      {msg.role === 'user' ? <Icons.User /> : <Icons.Bot />}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      {renderMessage(msg.content)}
                    </div>
                  </div>
                ))}
                {isTyping && (
                  <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                    <div style={{ width: 32, height: 32, borderRadius: '50%', background: styles.bgTertiary, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      <Icons.Bot />
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                      <div style={{ display: 'flex', gap: 4, alignItems: 'center' }}>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: styles.textSecondary }} className="animate-bounce"></span>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: styles.textSecondary, animationDelay: '0.1s' }} className="animate-bounce"></span>
                        <span style={{ width: 6, height: 6, borderRadius: '50%', background: styles.textSecondary, animationDelay: '0.2s' }} className="animate-bounce"></span>
                      </div>
                      <button onClick={handleStopGeneration} className="stop-button">
                        <Icons.Square /> Stop generating
                      </button>
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>
              
              {/* Selected Files Preview */}
              {selectedFiles.length > 0 && (
                <div style={{ padding: '8px 16px', borderTop: `1px solid ${styles.borderColor}`, display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                  {selectedFiles.map((file, index) => (
                    <div key={index} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 12px', background: styles.bgTertiary, borderRadius: 8, fontSize: 13 }}>
                      <Icons.FileText />
                      <span>{file.name}</span>
                      <button onClick={() => removeFile(index)} style={{ padding: 2, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}>
                        <Icons.X />
                      </button>
                    </div>
                  ))}
                  <button onClick={clearFiles} style={{ padding: '8px 12px', background: 'none', border: `1px solid ${styles.borderColor}`, borderRadius: 8, cursor: 'pointer', color: styles.textSecondary, fontSize: 13 }}>
                    Clear all
                  </button>
                </div>
              )}
              
              {/* Voice Listening Indicator */}
              {isListening && (
                <div style={{ padding: '8px 16px', borderTop: `1px solid ${styles.borderColor}`, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <div className="voice-indicator">
                    <div className="voice-dot"></div>
                    <div className="audio-wave">
                      <span></span><span></span><span></span><span></span><span></span>
                    </div>
                    <span>Listening... Speak now</span>
                  </div>
                </div>
              )}
              
              {/* Input Area */}
              <div style={{ padding: mobile ? 12 : 16, borderTop: `1px solid ${styles.borderColor}`, background: styles.bgSecondary }}>
                <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8 }}>
                  {/* File Attachment */}
                  <input ref={fileInputRef} type="file" accept=".pdf,.docx,.doc,.txt,.md,.csv,.png,.jpg,.jpeg,.gif,.webp" multiple onChange={handleFileSelect} style={{ display: 'none' }} />
                  <button onClick={() => fileInputRef.current?.click()} style={{ padding: 10, borderRadius: 8, border: 'none', background: styles.bgTertiary, cursor: 'pointer', color: styles.textSecondary }}>
                    <Icons.Paperclip />
                  </button>
                  
                  {/* Voice to Text Button */}
                  <button onClick={toggleVoiceInput} style={{ padding: 10, borderRadius: 8, border: 'none', background: isListening ? 'rgba(239, 68, 68, 0.1)' : styles.bgTertiary, cursor: 'pointer', color: isListening ? '#ef4444' : styles.textSecondary }}>
                    {isListening ? <Icons.Square /> : <Icons.Mic />}
                  </button>
                  
                  {/* Text Input */}
                  <div style={{ flex: 1, position: 'relative' }}>
                    <textarea
                      ref={textareaRef}
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                      placeholder={isListening ? 'Listening... Your speech will appear here' : 'Type a message...'}
                      style={{ width: '100%', padding: '12px 16px', borderRadius: 12, border: `1px solid ${isListening ? '#ef4444' : styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, resize: 'none', outline: 'none', maxHeight: 150, fontSize: 15 }}
                      rows={1}
                    />
                  </div>
                  
                  {/* Send Button */}
                  <button onClick={handleSend} disabled={isTyping || (!input.trim() && selectedFiles.length === 0)} style={{ padding: 12, borderRadius: 12, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: isTyping ? 'wait' : 'pointer', opacity: isTyping || (!input.trim() && selectedFiles.length === 0) ? 0.5 : 1 }}>
                    <Icons.Send />
                  </button>
                </div>
              </div>
            </main>
          </div>
          
          {/* Login Modal */}
          {showLogin && (
            <div className="modal-overlay" onClick={() => setShowLogin(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Sign In</h2>
                  <button onClick={() => setShowLogin(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <form onSubmit={handleLogin}>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Email</label>
                    <input type="email" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} required style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Password</label>
                    <input type="password" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} required style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 15, marginBottom: 12 }}>
                    {loading ? 'Signing in...' : 'Sign In'}
                  </button>
                </form>
                <div style={{ textAlign: 'center', marginTop: 12 }}>
                  <button onClick={() => { setShowLogin(false); setShowForgotPassword(true); }} style={{ background: 'none', border: 'none', color: styles.accentColor, cursor: 'pointer', fontSize: 14 }}>Forgot password?</button>
                </div>
                <div style={{ textAlign: 'center', marginTop: 8 }}>
                  <span style={{ color: styles.textSecondary, fontSize: 14 }}>Don't have an account? </span>
                  <button onClick={() => { setShowLogin(false); setShowRegister(true); }} style={{ background: 'none', border: 'none', color: styles.accentColor, cursor: 'pointer', fontSize: 14 }}>Sign Up</button>
                </div>
              </div>
            </div>
          )}
          
          {/* Register Modal */}
          {showRegister && (
            <div className="modal-overlay" onClick={() => setShowRegister(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Create Account</h2>
                  <button onClick={() => setShowRegister(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <form onSubmit={handleRegister}>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Name</label>
                    <input type="text" value={registerName} onChange={(e) => setRegisterName(e.target.value)} required style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Email</label>
                    <input type="email" value={registerEmail} onChange={(e) => setRegisterEmail(e.target.value)} required style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Password (min 6 characters)</label>
                    <input type="password" value={registerPassword} onChange={(e) => setRegisterPassword(e.target.value)} required minLength={6} style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <div style={{ marginBottom: 16 }}>
                    <label style={{ display: 'block', marginBottom: 6, fontSize: 14, color: styles.textSecondary }}>Confirm Password</label>
                    <input type="password" value={registerConfirm} onChange={(e) => setRegisterConfirm(e.target.value)} required style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15 }} />
                  </div>
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 15 }}>
                    {loading ? 'Creating account...' : 'Create Account'}
                  </button>
                </form>
                <div style={{ textAlign: 'center', marginTop: 12 }}>
                  <span style={{ color: styles.textSecondary, fontSize: 14 }}>Already have an account? </span>
                  <button onClick={() => { setShowRegister(false); setShowLogin(true); }} style={{ background: 'none', border: 'none', color: styles.accentColor, cursor: 'pointer', fontSize: 14 }}>Sign In</button>
                </div>
              </div>
            </div>
          )}
          
          {/* Verification Modal */}
          {showVerification && (
            <div className="modal-overlay" onClick={() => setShowVerification(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Verify Email</h2>
                  <button onClick={() => setShowVerification(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <p style={{ color: styles.textSecondary, marginBottom: 16 }}>Enter the verification code sent to your email.</p>
                <input type="text" value={verificationInput} onChange={(e) => setVerificationInput(e.target.value)} placeholder="Enter code" maxLength={6} style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 18, textAlign: 'center', letterSpacing: 8, marginBottom: 16 }} />
                <button onClick={handleVerify} disabled={loading || verificationInput.length !== 6} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 15 }}>
                  {loading ? 'Verifying...' : 'Verify'}
                </button>
              </div>
            </div>
          )}
          
          {/* Profile Modal */}
          {showProfile && currentUser && (
            <div className="modal-overlay" onClick={() => setShowProfile(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Profile</h2>
                  <button onClick={() => setShowProfile(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <div style={{ textAlign: 'center', marginBottom: 20 }}>
                  <div style={{ width: 64, height: 64, borderRadius: '50%', background: styles.accentColor, margin: '0 auto 12px', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 24, fontWeight: 600 }}>
                    {userInitials}
                  </div>
                  <h3 style={{ margin: '0 0 4px' }}>{currentUser.name}</h3>
                  <p style={{ color: styles.textSecondary, margin: 0, fontSize: 14 }}>{currentUser.email}</p>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  <button onClick={handleLogout} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.bgTertiary, border: 'none', cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, color: styles.textPrimary }}>
                    <Icons.LogOut /> Log Out
                  </button>
                  <button onClick={() => { if (confirm('Are you sure you want to delete your account? This cannot be undone.')) handleDeleteAccount(); }} style={{ width: '100%', padding: 12, borderRadius: 8, background: 'rgba(239, 68, 68, 0.1)', border: '1px solid rgba(239, 68, 68, 0.3)', cursor: 'pointer', color: '#ef4444' }}>
                    Delete Account
                  </button>
                </div>
              </div>
            </div>
          )}
          
          {/* Forgot Password Modal */}
          {showForgotPassword && (
            <div className="modal-overlay" onClick={() => setShowForgotPassword(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>Reset Password</h2>
                  <button onClick={() => setShowForgotPassword(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <p style={{ color: styles.textSecondary, marginBottom: 16 }}>Enter your email to check if an account exists.</p>
                <input type="email" value={recoveryEmail} onChange={(e) => setRecoveryEmail(e.target.value)} placeholder="Email address" style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15, marginBottom: 16 }} />
                <button onClick={async () => {
                  setLoading(true);
                  try {
                    const result = await API.checkEmail(recoveryEmail);
                    if (result.exists) {
                      const code = Math.floor(100000 + Math.random() * 900000).toString();
                      setRecoveryCode(code);
                      await window.emailjs.send(CONFIG.EMAILJS_SERVICE_ID, CONFIG.EMAILJS_TEMPLATE_ID, { to_email: recoveryEmail, verification_code: code });
                      setShowForgotPassword(false);
                      setShowResetPassword(true);
                      toast('Code Sent', 'Check your email for the verification code', 'success');
                    } else {
                      toast('Account Not Found', 'No account exists with this email', 'error');
                    }
                  } catch (e) { toast('Error', 'Failed to send code', 'error'); }
                  finally { setLoading(false); }
                }} disabled={loading || !recoveryEmail} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 15 }}>
                  {loading ? 'Checking...' : 'Continue'}
                </button>
                <div style={{ textAlign: 'center', marginTop: 12 }}>
                  <button onClick={() => { setShowForgotPassword(false); setShowLogin(true); }} style={{ background: 'none', border: 'none', color: styles.accentColor, cursor: 'pointer', fontSize: 14 }}>Back to Sign In</button>
                </div>
              </div>
            </div>
          )}
          
          {/* Reset Password Modal */}
          {showResetPassword && (
            <div className="modal-overlay" onClick={() => setShowResetPassword(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff', borderColor: styles.borderColor }} onClick={(e) => e.stopPropagation()}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                  <h2 style={{ margin: 0, fontSize: 20 }}>New Password</h2>
                  <button onClick={() => setShowResetPassword(false)} style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}><Icons.XLarge /></button>
                </div>
                <input type="text" value={recoveryCodeInput} onChange={(e) => setRecoveryCodeInput(e.target.value)} placeholder="Verification code" maxLength={6} style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15, marginBottom: 12 }} />
                <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="New password (min 6 characters)" style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15, marginBottom: 12 }} />
                <input type="password" value={newPasswordConfirm} onChange={(e) => setNewPasswordConfirm(e.target.value)} placeholder="Confirm new password" style={{ width: '100%', padding: 12, borderRadius: 8, border: `1px solid ${styles.borderColor}`, background: styles.bgTertiary, color: styles.textPrimary, fontSize: 15, marginBottom: 16 }} />
                <button onClick={async () => {
                  if (recoveryCodeInput !== recoveryCode) { toast('Error', 'Invalid verification code', 'error'); return; }
                  if (newPassword !== newPasswordConfirm) { toast('Error', 'Passwords do not match', 'error'); return; }
                  if (newPassword.length < 6) { toast('Error', 'Password must be at least 6 characters', 'error'); return; }
                  setLoading(true);
                  try {
                    const result = await API.resetPassword(recoveryEmail, newPassword);
                    if (result.success) {
                      setShowResetPassword(false);
                      setShowLogin(true);
                      toast('Password Reset', 'You can now sign in with your new password', 'success');
                    } else { toast('Error', result.error, 'error'); }
                  } catch (e) { toast('Error', 'Failed to reset password', 'error'); }
                  finally { setLoading(false); }
                }} disabled={loading || recoveryCodeInput.length !== 6 || newPassword.length < 6 || newPassword !== newPasswordConfirm} style={{ width: '100%', padding: 12, borderRadius: 8, background: styles.buttonPrimary, color: styles.buttonPrimaryText, border: 'none', cursor: 'pointer', fontWeight: 500, fontSize: 15 }}>
                  {loading ? 'Resetting...' : 'Reset Password'}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // Render App
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  </script>
</body>
</html>
