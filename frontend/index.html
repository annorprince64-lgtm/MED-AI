      Shield: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/></svg>,
      Trash: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>,
      Paperclip: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m16 6-8.414 8.586a2 2 0 0 0 2.829 2.829l8.414-8.586a4 4 0 1 0-5.657-5.657l-8.379 8.551a6 6 0 1 0 8.485 8.485l8.379-8.551"/></svg>,
    };
    
    // ==================== UTILITIES ====================
    const generateId = () => `${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    const isMobile = () => window.innerWidth < 768;
    
    // ==================== STORAGE ====================
    const loadState = () => {
      try {
        const saved = localStorage.getItem('askai-storage-v10');
        return saved ? JSON.parse(saved) : null;
      } catch { return null; }
    };
    
    const saveState = (state) => {
      try {
        localStorage.setItem('askai-storage-v10', JSON.stringify({
          currentUser: state.currentUser,
          isAuthenticated: state.isAuthenticated,
          chats: state.chats,
          currentChatId: state.currentChatId,
          theme: state.theme,
        }));
      } catch {}
    };
    
    // ==================== API WITH BETTER ERROR HANDLING ====================
    const api = {
      // Timeout wrapper for fetch
      fetchWithTimeout: async (url, options, timeout = 30000) => {
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), timeout);
        
        try {
          const response = await fetch(url, {
            ...options,
            signal: controller.signal,
          });
          clearTimeout(id);
          return response;
        } catch (error) {
          clearTimeout(id);
          throw error;
        }
      },
      
      analyzeText: async (text, conversationHistory = [], attachment = null, signal = null) => {
        const body = { text, conversation_history: conversationHistory };
        if (attachment) body.attachment = attachment;
        
        try {
          const res = await fetch(`${BACKEND_URL}/analyze`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: signal,
          });
          
          if (!res.ok) {
            throw new Error(`Server error: ${res.status}`);
          }
          
          return await res.json();
        } catch (error) {
          if (error.name === 'AbortError') {
            throw error; // Let caller handle abort
          }
          console.error('API Error:', error);
          return { 
            response: `**Connection Error**\n\nUnable to connect to the server. Please check:\n1. Your internet connection\n2. The backend server is running\n\nError: ${error.message}`,
            error: true 
          };
        }
      },
      
      login: async (email, password) => {
        try {
          const res = await fetch(`${BACKEND_URL}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          return await res.json();
        } catch (error) {
          return { success: false, error: 'Connection failed. Please check your internet.' };
        }
      },
      
      register: async (username, email, password) => {
        try {
          const res = await fetch(`${BACKEND_URL}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password }),
          });
          return await res.json();
        } catch (error) {
          return { success: false, error: 'Connection failed. Please check your internet.' };
        }
      },
      
      updateProfile: async (originalEmail, name, newEmail, currentPassword, newPassword) => {
        try {
          const res = await fetch(`${BACKEND_URL}/update-profile`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ originalEmail, name, newEmail, currentPassword, newPassword }),
          });
          return await res.json();
        } catch (error) {
          return { success: false, error: 'Connection failed' };
        }
      },
      
      loadChats: async (userId) => {
        try {
          const res = await fetch(`${BACKEND_URL}/chats/load?user_id=${userId}`);
          return await res.json();
        } catch (error) {
          return { success: false, chats: {} };
        }
      },
      
      saveChat: async (userId, chatData) => {
        try {
          await fetch(`${BACKEND_URL}/chats/save`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, chat_data: chatData }),
          });
        } catch (error) {
          console.error('Save chat error:', error);
        }

      deleteAccount: async (email, password) => {
        try {
          const res = await fetch(`${BACKEND_URL}/delete-account`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          return await res.json();
        } catch (error) {

        try {

      resetPassword: async (email, new_password) => {

        }
      },
    };
    
    // ==================== TOAST CONTEXT ====================
    const ToastContext = React.createContext();
    
    const ToastProvider = ({ children }) => {
      const [toasts, setToasts] = React.useState([]);
      
      const addToast = (title, description, type = 'default') => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, title, description, type }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 4000);
      };
      
      return (
        <ToastContext.Provider value={{ toast: addToast }}>
          {children}
          <div className="toast-container">
            {toasts.map(t => (
              <div key={t.id} className={`toast ${t.type}`}>
                <strong>{t.title}</strong>
                {t.description && <div style={{ fontSize: 13, opacity: 0.9, marginTop: 2 }}>{t.description}</div>}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    };
    
    const useToast = () => React.useContext(ToastContext);
    
    // ==================== VOICE RECOGNITION HOOK ====================
    const useVoiceRecognition = (toast) => {
      const [isListening, setIsListening] = React.useState(false);
      const recognitionRef = React.useRef(null);
      const manualStopRef = React.useRef(false);
      
      const startListening = React.useCallback((onResult) => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
          toast('Not Supported', 'Use Chrome, Edge, or Safari for voice input', 'error');
          return false;
        }
        
        // Stop any existing recognition
        if (recognitionRef.current) {
          try {
            recognitionRef.current.stop();
          } catch (e) {}
        }
        
        try {
          const recognition = new SpeechRecognition();
          recognitionRef.current = recognition;
          manualStopRef.current = false;
          
          recognition.continuous = true;
          recognition.interimResults = false;
          recognition.lang = 'en-US';
          
          recognition.onstart = () => {
            setIsListening(true);
            toast('Listening...', 'Speak now, your words will appear in the text box', 'success');
          };
          
          recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
              if (event.results[i].isFinal) {
                transcript += event.results[i][0].transcript;
              }
            }
            if (transcript && onResult) {
              onResult(transcript);
            }
          };
          
          recognition.onerror = (event) => {
            console.log('Speech error:', event.error);
            
            if (manualStopRef.current) return;
            
            setIsListening(false);
            
            switch(event.error) {
              case 'no-speech':
                toast('No Speech', 'No speech was detected. Please try again.', 'error');
                break;
              case 'audio-capture':
                toast('No Microphone', 'No microphone found. Please connect a microphone.', 'error');
                break;
              case 'not-allowed':
                toast('Permission Denied', 'Please allow microphone access in your browser settings.', 'error');
                break;
              case 'network':
                toast('Network Error', 'Speech recognition requires internet connection.', 'error');
                break;
              case 'aborted':
                break;
              default:
                if (event.error) {
                  toast('Voice Error', `Error: ${event.error}`, 'error');
                }
            }
          };
          
          recognition.onend = () => {
            setIsListening(false);
          };
          
          // Request microphone permission first
          navigator.mediaDevices.getUserMedia({ audio: true })
            .then((stream) => {
              // Stop the test stream
              stream.getTracks().forEach(track => track.stop());
              // Start recognition
              recognition.start();
            })
            .catch((err) => {
              setIsListening(false);
              if (err.name === 'NotAllowedError') {
                toast('Permission Denied', 'Microphone access was denied. Please allow it in browser settings.', 'error');
              } else if (err.name === 'NotFoundError') {
                toast('No Microphone', 'No microphone device found.', 'error');
              } else {
                toast('Microphone Error', 'Could not access microphone: ' + err.message, 'error');
              }
            });
          
          return true;
        } catch (error) {
          console.error('Speech recognition init error:', error);
          toast('Voice Error', 'Could not initialize voice recognition', 'error');
          return false;
        }
      }, [toast]);
      
      const stopListening = React.useCallback(() => {
        manualStopRef.current = true;
        if (recognitionRef.current) {
          try {
            recognitionRef.current.stop();
          } catch (e) {}
        }
        setIsListening(false);
      }, []);
      
      const toggleListening = React.useCallback((onResult) => {
        if (isListening) {
          stopListening();
        } else {
          startListening(onResult);
        }
      }, [isListening, startListening, stopListening]);
      
      // Cleanup on unmount
      React.useEffect(() => {
        return () => {
          if (recognitionRef.current) {
            try {
              recognitionRef.current.stop();
            } catch (e) {}
          }
        };
      }, []);
      
      return { isListening, startListening, stopListening, toggleListening };
    };
    
    // ==================== MAIN APP ====================
    function App() {
      const savedState = loadState();
      const { toast } = useToast();
      
      // State
      const [currentUser, setCurrentUser] = React.useState(savedState?.currentUser || null);
      const [isAuthenticated, setIsAuthenticated] = React.useState(savedState?.isAuthenticated || false);
      const [chats, setChats] = React.useState(savedState?.chats || {});
      const [currentChatId, setCurrentChatId] = React.useState(savedState?.currentChatId || '');
      const [theme, setTheme] = React.useState(savedState?.theme || 'dark');
      const [isTyping, setIsTyping] = React.useState(false);
      const [isSidebarOpen, setIsSidebarOpen] = React.useState(false);
      const [input, setInput] = React.useState('');
      const [selectedFile, setSelectedFile] = React.useState(null);
      const fileInputRef = React.useRef(null);
      const abortControllerRef = React.useRef(null);
      
      // Modals
      const [showLogin, setShowLogin] = React.useState(false);
      const [showRegister, setShowRegister] = React.useState(false);
      const [showProfile, setShowProfile] = React.useState(false);
      const [showVerification, setShowVerification] = React.useState(false);
      const [showForgotPassword, setShowForgotPassword] = React.useState(false);
      const [showResetPassword, setShowResetPassword] = React.useState(false);
      
      // Form state
      const [loginEmail, setLoginEmail] = React.useState('');
      const [loginPassword, setLoginPassword] = React.useState('');
      const [registerName, setRegisterName] = React.useState('');
      const [registerEmail, setRegisterEmail] = React.useState('');
      const [registerPassword, setRegisterPassword] = React.useState('');
      const [registerConfirm, setRegisterConfirm] = React.useState('');
      const [verificationInput, setVerificationInput] = React.useState('');
      const [pendingUser, setPendingUser] = React.useState(null);
      const [verificationCode, setVerificationCode] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [recoveryEmail, setRecoveryEmail] = React.useState('');
      const [recoveryCode, setRecoveryCode] = React.useState('');
      const [recoveryCodeInput, setRecoveryCodeInput] = React.useState('');
      const [newPassword, setNewPassword] = React.useState('');
      const [newPasswordConfirm, setNewPasswordConfirm] = React.useState('');
      
      const messagesEndRef = React.useRef(null);
      const textareaRef = React.useRef(null);
      
      const isDark = theme === 'dark';
      const mobile = isMobile();
      
      // Voice recognition hook
      const { isListening, toggleListening } = useVoiceRecognition(toast);
      
      // Styles based on theme
      const styles = {
        bgPrimary: isDark ? '#000' : '#fff',
        bgSecondary: isDark ? '#111' : '#f5f5f5',
        bgTertiary: isDark ? '#1a1a1a' : '#e5e5e5',
        textPrimary: isDark ? '#fff' : '#000',
        textSecondary: isDark ? '#888' : '#666',
        borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)',
      };
      
      // Save state
      React.useEffect(() => {
        saveState({ currentUser, isAuthenticated, chats, currentChatId, theme });
      }, [currentUser, isAuthenticated, chats, currentChatId, theme]);
      
      // Initialize chat
      React.useEffect(() => {
        if (!currentChatId || Object.keys(chats).length === 0) {
          createNewChat(true);
        }
      }, []);
      
      // Scroll to bottom
      React.useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [chats[currentChatId]?.messages]);
      
      // Load chats from cloud
      React.useEffect(() => {
        if (currentUser?.id) loadChatsFromCloud();
      }, [currentUser?.id]);
      
      // Save chats to cloud
      React.useEffect(() => {
        if (currentUser?.id && Object.keys(chats).length > 0) {
          const t = setTimeout(() => {
            Object.values(chats).forEach(chat => {
              api.saveChat(currentUser.id, chat).catch(() => {});
            });
          }, 2000);
          return () => clearTimeout(t);
        }
      }, [chats, currentUser?.id]);
      
      // Auto-resize textarea
      React.useEffect(() => {
        if (textareaRef.current) {
          textareaRef.current.style.height = 'auto';
          textareaRef.current.style.height = Math.min(textareaRef.current.scrollHeight, 150) + 'px';
        }
      }, [input]);
      
      const loadChatsFromCloud = async () => {
        if (!currentUser?.id) return;
        try {
          const result = await api.loadChats(currentUser.id);
          if (result.success && result.chats && Object.keys(result.chats).length > 0) {
            setChats(result.chats);
            setCurrentChatId(Object.keys(result.chats)[0]);
          }
        } catch (e) {
          console.error('Failed to load chats:', e);
        }
      };
      
      const createNewChat = (initial = false) => {
        const id = generateId();
        const newChat = {
          id,
          title: 'New Conversation',
          date: new Date().toISOString(),
          messages: [{
            id: generateId(),
            role: 'ai',
            content: "Hello! I'm **ASK AI**, your intelligent assistant created by **Annor Prince** and **Yeboah Collins**. How can I help you today?",
            timestamp: new Date().toISOString(),
          }],
        };
        setChats(prev => ({ ...prev, [id]: newChat }));
        setCurrentChatId(id);
        if (!initial) setIsSidebarOpen(false);
        return id;
      };
      
      const deleteChat = (chatId) => {
        const chatIds = Object.keys(chats);
        if (chatIds.length <= 1) return;
        const newChats = { ...chats };
        delete newChats[chatId];
        let newCurrentId = currentChatId;
        if (chatId === currentChatId) {
          newCurrentId = Object.keys(newChats)[0];
        }
        setChats(newChats);
        setCurrentChatId(newCurrentId);
      };
      
      const addMessage = (chatId, message) => {
        setChats(prev => ({
          ...prev,
          [chatId]: {
            ...prev[chatId],
            messages: [...prev[chatId].messages, message],
            date: new Date().toISOString(),
          },
        }));
      };
      
      const updateChatTitle = (chatId, title) => {
        setChats(prev => ({
          ...prev,
          [chatId]: { ...prev[chatId], title },
        }));
      };
      
      const buildConversationHistory = (currentMessages) => {
        return currentMessages.slice(-10)
          .filter(m => !m.content.includes("Hello! I'm **ASK AI**"))
          .map(m => ({ role: m.role, content: m.content }));
      };
      
      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (file) {
          if (file.size > 10 * 1024 * 1024) {
            toast('File Too Large', 'Please select a file under 10MB', 'error');
            return;
          }
          setSelectedFile(file);
          toast('File Attached', file.name, 'success');
        }
      };
      
      const removeFile = () => {
        setSelectedFile(null);
        if (fileInputRef.current) fileInputRef.current.value = '';
      };
      
      const readFileAsBase64 = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      };
      
      const stopGeneration = () => {
        if (abortControllerRef.current) {
          abortControllerRef.current.abort();
          abortControllerRef.current = null;
        }
        setIsTyping(false);
        toast('Stopped', 'AI generation cancelled');
      };
      
      const handleSend = async () => {
        const content = input.trim();
        if (!content || isTyping) return;
        setInput('');
        
        if (mobile) setIsSidebarOpen(false);
        
        let messageContent = content;
        let attachmentData = null;
        
        if (selectedFile) {
          try {
            const base64 = await readFileAsBase64(selectedFile);
            attachmentData = { name: selectedFile.name, type: selectedFile.type, data: base64 };
            messageContent = `${content}\n\n[Attached: ${selectedFile.name}]`;
          } catch (e) {
            toast('Error', 'Failed to read file', 'error');
            return;
          }
        }
        
        addMessage(currentChatId, {
          id: generateId(),
          role: 'user',
          content: messageContent,
          timestamp: new Date().toISOString(),
        });
        
        setSelectedFile(null);
        if (fileInputRef.current) fileInputRef.current.value = '';
        
        const currentChat = chats[currentChatId];
        if (currentChat && currentChat.messages.length <= 1) {
          updateChatTitle(currentChatId, content.length > 30 ? content.slice(0, 30) + '...' : content);
        }
        
        setIsTyping(true);
        abortControllerRef.current = new AbortController();
        
        try {
          const updatedChat = chats[currentChatId];
          const allMessages = [...(updatedChat?.messages || []), {
            id: generateId(),
            role: 'user',
            content,
            timestamp: new Date().toISOString(),
          }];
          
          const conversationHistory = buildConversationHistory(allMessages);
          
          const response = await api.analyzeText(content, conversationHistory, attachmentData, abortControllerRef.current.signal);
          
          addMessage(currentChatId, {
            id: generateId(),
            role: 'ai',
            content: response.response || response.error || 'I could not process your request.',
            timestamp: new Date().toISOString(),
          });
        } catch (error) {
          if (error.name !== 'AbortError') {
            addMessage(currentChatId, {
              id: generateId(),
              role: 'ai',
              content: "I'm having trouble connecting. Please check your internet and try again.",
              timestamp: new Date().toISOString(),
            });
          }
        } finally {
          setIsTyping(false);
          abortControllerRef.current = null;
        }
      };
      
      // Voice input handler
      const handleVoiceInput = () => {
        toggleListening((transcript) => {
          setInput(prev => {
            const trimmed = prev.trim();
            return trimmed ? `${trimmed} ${transcript}` : transcript;
          });
        });
      };
      
      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const result = await api.login(loginEmail, loginPassword);
          if (result.success && result.user) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowLogin(false);
            setLoginEmail('');
            setLoginPassword('');
            toast('Welcome back!', `Logged in as ${result.user.name || result.user.username}`, 'success');
          } else {
            toast('Login Failed', result.error || 'Invalid credentials', 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to connect', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleRegister = async (e) => {
        e.preventDefault();
        if (registerPassword !== registerConfirm) {
          toast('Error', 'Passwords do not match', 'error');
          return;
        }
        if (registerPassword.length < 6) {
          toast('Error', 'Password must be at least 6 characters', 'error');
          return;
        }
        setLoading(true);
        const code = Math.floor(100000 + Math.random() * 900000).toString();
        setVerificationCode(code);
        setPendingUser({ name: registerName, email: registerEmail, password: registerPassword });
        try {
          if (window.emailjs) {
            await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
              to_email: registerEmail,
              verification_code: code,
            });
            setShowRegister(false);
            setShowVerification(true);
            toast('Verification Sent', 'Check your email for the code', 'success');
          } else {
            toast('Error', 'Email service not available', 'error');
          }
        } catch (e) {
          toast('Error', 'Failed to send verification email', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleVerify = async () => {
        if (verificationInput !== verificationCode) {
          toast('Error', 'Invalid verification code', 'error');
          return;
        }
        setLoading(true);
        try {
          const result = await api.register(pendingUser.name, pendingUser.email, pendingUser.password);
          if (result.success) {
            setCurrentUser(result.user);
            setIsAuthenticated(true);
            setShowVerification(false);
            setPendingUser(null);
            setVerificationCode('');
            setVerificationInput('');
            setRegisterName('');
            setRegisterEmail('');
            setRegisterPassword('');
            setRegisterConfirm('');
            toast('Welcome!', 'Account created successfully', 'success');
          } else {
            toast('Error', result.error || 'Registration failed', 'error');
          }
        } catch (e) {
          toast('Error', 'Registration failed', 'error');
        } finally {
          setLoading(false);
        }
      };
      
      const handleLogout = () => {
        setCurrentUser(null);
        setIsAuthenticated(false);
        toast('Logged out', 'See you next time!');
      };
      
      // Render markdown
      const renderMarkdown = (text) => {
        if (!text) return '';
        try {
          return { __html: marked.parse(text) };
        } catch {
          return { __html: text };
        }
      };
      
      const currentChat = chats[currentChatId];
      const messages = currentChat?.messages || [];
      
      return (
        <div style={{ height: '100%', background: styles.bgPrimary, color: styles.textPrimary }}>
          {/* Sidebar Overlay */}
          {isSidebarOpen && <div className="sidebar-overlay" onClick={() => setIsSidebarOpen(false)} />}
          
          {/* Sidebar */}
          <div style={{
            position: 'fixed',
            left: 0,
            top: 0,
            bottom: 0,
            width: 280,
            background: styles.bgSecondary,
            borderRight: `1px solid ${styles.borderColor}`,
            transform: isSidebarOpen ? 'translateX(0)' : 'translateX(-100%)',
            transition: 'transform 0.3s ease',
            zIndex: 50,
            display: 'flex',
            flexDirection: 'column',
          }}>
            <div style={{ padding: 16, borderBottom: `1px solid ${styles.borderColor}` }}>
              <button
                onClick={() => createNewChat()}
                style={{
                  width: '100%',
                  padding: '12px 16px',
                  borderRadius: 12,
                  border: `1px solid ${styles.borderColor}`,
                  background: 'transparent',
                  color: styles.textPrimary,
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  gap: 12,
                  fontSize: 14,
                }}
              >
                <Icons.Plus /> New Chat
              </button>
            </div>
            
            <div style={{ flex: 1, overflowY: 'auto', padding: 8 }} className="custom-scrollbar">
              {Object.values(chats).reverse().map(chat => (
                <div
                  key={chat.id}
                  onClick={() => { setCurrentChatId(chat.id); setIsSidebarOpen(false); }}
                  style={{
                    padding: '12px 16px',
                    borderRadius: 10,
                    cursor: 'pointer',
                    marginBottom: 4,
                    background: chat.id === currentChatId ? (isDark ? '#222' : '#e5e5e5') : 'transparent',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'space-between',
                  }}
                >
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12, overflow: 'hidden' }}>
                    <Icons.MessageSquare />
                    <span style={{ fontSize: 14, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                      {chat.title}
                    </span>
                  </div>
                  {Object.keys(chats).length > 1 && (
                    <button
                      onClick={(e) => { e.stopPropagation(); deleteChat(chat.id); }}
                      style={{ padding: 4, background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}
                    >
                      <Icons.Trash />
                    </button>
                  )}
                </div>
              ))}
            </div>
            
            <div style={{ padding: 16, borderTop: `1px solid ${styles.borderColor}` }}>
              <button
                onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                style={{
                  width: '100%',
                  padding: '12px 16px',
                  borderRadius: 10,
                  border: 'none',
                  background: 'transparent',
                  color: styles.textPrimary,
                  cursor: 'pointer',
                  display: 'flex',
                  alignItems: 'center',
                  gap: 12,
                }}
              >
                {isDark ? <Icons.Sun /> : <Icons.Moon />} {isDark ? 'Light Mode' : 'Dark Mode'}
              </button>
              
              {isAuthenticated ? (
                <div style={{ marginTop: 8 }}>
                  <button
                    onClick={() => setShowProfile(true)}
                    style={{
                      width: '100%',
                      padding: '12px 16px',
                      borderRadius: 10,
                      border: 'none',
                      background: 'transparent',
                      color: styles.textPrimary,
                      cursor: 'pointer',
                      display: 'flex',
                      alignItems: 'center',
                      gap: 12,
                    }}
                  >
                    <Icons.User /> {currentUser?.name || currentUser?.username}
                  </button>
                  <button
                    onClick={handleLogout}
                    style={{
                      width: '100%',
                      padding: '12px 16px',
                      borderRadius: 10,
                      border: 'none',
                      background: 'transparent',
                      color: '#ef4444',
                      cursor: 'pointer',
                      display: 'flex',
                      alignItems: 'center',
                      gap: 12,
                    }}
                  >
                    <Icons.LogOut /> Log out
                  </button>
                </div>
              ) : (
                <button
                  onClick={() => setShowLogin(true)}
                  style={{
                    width: '100%',
                    padding: '12px 16px',
                    borderRadius: 10,
                    border: 'none',
                    background: isDark ? '#fff' : '#000',
                    color: isDark ? '#000' : '#fff',
                    cursor: 'pointer',
                    marginTop: 8,
                  }}
                >
                  Sign in
                </button>
              )}
            </div>
          </div>
          
          {/* Main Content */}
          <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
            {/* Header */}
            <div style={{
              padding: '12px 16px',
              borderBottom: `1px solid ${styles.borderColor}`,
              display: 'flex',
              alignItems: 'center',
              gap: 12,
            }}>
              <button
                onClick={() => setIsSidebarOpen(true)}
                style={{ padding: 8, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}
              >
                <Icons.Menu />
              </button>
              <h1 style={{ fontSize: 18, fontWeight: 600 }}>ASK AI</h1>
            </div>
            
            {/* Messages */}
            <div style={{ flex: 1, overflowY: 'auto', padding: 16 }} className="custom-scrollbar" ref={messagesEndRef}>
              {messages.map((msg) => (
                <div
                  key={msg.id}
                  style={{
                    marginBottom: 16,
                    display: 'flex',
                    gap: 12,
                    alignItems: 'flex-start',
                  }}
                >
                  <div style={{
                    width: 32,
                    height: 32,
                    borderRadius: '50%',
                    background: msg.role === 'user' ? (isDark ? '#fff' : '#000') : (isDark ? '#222' : '#e5e5e5'),
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                    flexShrink: 0,
                    color: msg.role === 'user' ? (isDark ? '#000' : '#fff') : styles.textPrimary,
                  }}>
                    {msg.role === 'user' ? <Icons.User /> : <Icons.Bot />}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div
                      className={isDark ? 'markdown-dark' : 'markdown-light'}
                      dangerouslySetInnerHTML={renderMarkdown(msg.content)}
                    />
                  </div>
                </div>
              ))}
              
              {isTyping && (
                <div style={{ display: 'flex', gap: 12, alignItems: 'flex-start', marginBottom: 16 }}>
                  <div style={{
                    width: 32,
                    height: 32,
                    borderRadius: '50%',
                    background: isDark ? '#222' : '#e5e5e5',
                    display: 'flex',
                    alignItems: 'center',
                    justifyContent: 'center',
                  }}>
                    <Icons.Bot />
                  </div>
                  <div style={{ display: 'flex', gap: 4, padding: '8px 0' }}>
                    <span className="animate-bounce" style={{ width: 8, height: 8, borderRadius: '50%', background: styles.textSecondary }}></span>
                    <span className="animate-bounce" style={{ width: 8, height: 8, borderRadius: '50%', background: styles.textSecondary, animationDelay: '0.1s' }}></span>
                    <span className="animate-bounce" style={{ width: 8, height: 8, borderRadius: '50%', background: styles.textSecondary, animationDelay: '0.2s' }}></span>
                  </div>
                </div>
              )}
            </div>
            
            {/* Input Area */}
            <div style={{ padding: 16, borderTop: `1px solid ${styles.borderColor}` }}>
              {selectedFile && (
                <div style={{
                  marginBottom: 8,
                  padding: '8px 12px',
                  borderRadius: 8,
                  background: styles.bgSecondary,
                  display: 'flex',
                  alignItems: 'center',
                  justifyContent: 'space-between',
                }}>
                  <span style={{ fontSize: 14 }}>📎 {selectedFile.name}</span>
                  <button onClick={removeFile} style={{ background: 'none', border: 'none', cursor: 'pointer', color: styles.textSecondary }}>
                    <Icons.X />
                  </button>
                </div>
              )}
              
              <div style={{
                display: 'flex',
                alignItems: 'flex-end',
                gap: 8,
                padding: '8px 12px',
                borderRadius: 24,
                background: styles.bgSecondary,
                border: `1px solid ${styles.borderColor}`,
              }}>
                <input
                  ref={fileInputRef}
                  type="file"
                  onChange={handleFileSelect}
                  style={{ display: 'none' }}
                  accept=".txt,.pdf,.doc,.docx,.jpg,.jpeg,.png,.gif"
                />
                <button
                  onClick={() => fileInputRef.current?.click()}
                  style={{ padding: 8, borderRadius: '50%', border: 'none', background: 'none', cursor: 'pointer', color: styles.textSecondary }}
                >
                  <Icons.Paperclip />
                </button>
                
                <textarea
                  ref={textareaRef}
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                      e.preventDefault();
                      handleSend();
                    }
                  }}
                  placeholder={isListening ? "🎤 Listening..." : "Message ASK AI..."}
                  disabled={isTyping}
                  style={{
                    flex: 1,
                    background: 'transparent',
                    border: 'none',
                    outline: 'none',
                    padding: '8px 0',
                    resize: 'none',
                    maxHeight: 150,
                    fontSize: 16,
                    color: isDark ? '#fff' : '#000',
                    lineHeight: 1.5,
                  }}
                  rows={1}
                />
                
                {/* Voice Button */}
                <button
                  onClick={handleVoiceInput}
                  disabled={isTyping}
                  style={{
                    padding: 8,
                    borderRadius: '50%',
                    border: 'none',
                    background: isListening ? '#ef4444' : 'transparent',
                    color: isListening ? '#fff' : styles.textSecondary,
                    cursor: isTyping ? 'not-allowed' : 'pointer',
                  }}
                  className={isListening ? 'animate-pulse-recording' : ''}
                >
                  {isListening ? <Icons.MicOff /> : <Icons.Mic />}
                </button>
                
                {/* Send/Stop Button */}
                {isTyping ? (
                  <button
                    onClick={stopGeneration}
                    style={{
                      padding: 10,
                      borderRadius: '50%',
                      border: 'none',
                      background: '#ef4444',
                      color: '#fff',
                      cursor: 'pointer',
                    }}
                  >
                    <Icons.Stop />
                  </button>
                ) : (
                  <button
                    onClick={handleSend}
                    disabled={!input.trim()}
                    style={{
                      padding: 10,
                      borderRadius: '50%',
                      border: 'none',
                      background: input.trim() ? (isDark ? '#fff' : '#000') : 'transparent',
                      color: input.trim() ? (isDark ? '#000' : '#fff') : styles.textSecondary,
                      cursor: input.trim() ? 'pointer' : 'not-allowed',
                    }}
                  >
                    <Icons.Send />
                  </button>
                )}
              </div>
              
              <p style={{ fontSize: 11, textAlign: 'center', marginTop: 12, color: styles.textSecondary, opacity: 0.7 }}>
                ASK AI can make mistakes. Consider checking important information.
              </p>
            </div>
          </div>
          
          {/* Login Modal */}
          {showLogin && (
            <div className="modal-overlay" onClick={() => setShowLogin(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowLogin(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Welcome back</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Sign in to your account</p>
                </div>
                <form onSubmit={handleLogin} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <input
                    type="email"
                    value={loginEmail}
                    required
                    onChange={(e) => setLoginEmail(e.target.value)}
                    placeholder="Email"
                    style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }}
                  />
                  <input
                    type="password"
                    value={loginPassword}
                    required
                    onChange={(e) => setLoginPassword(e.target.value)}
                    placeholder="Password"
                    style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }}
                  />
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: 14, borderRadius: 12, background: isDark ? '#fff' : '#000', color: isDark ? '#000' : '#fff', border: 'none', fontSize: 16, cursor: 'pointer' }}>
                    {loading ? <Icons.Loader /> : 'Sign in'}
                  </button>
                </form>
                <p style={{ textAlign: 'center', marginTop: 12, fontSize: 14 }}>
                  <button onClick={() => { setShowLogin(false); setShowForgotPassword(true); }} style={{ color: styles.textPrimary, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Forgot Password?</button>
                </p>
                <p style={{ textAlign: 'center', marginTop: 8, fontSize: 14, color: styles.textSecondary }}>
                  Don't have an account? <button onClick={() => { setShowLogin(false); setShowRegister(true); }} style={{ color: styles.textPrimary, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Sign up</button>
                </p>
              </div>
            </div>
          )}
          
          {/* Register Modal */}
          {showRegister && (
            <div className="modal-overlay" onClick={() => setShowRegister(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowRegister(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Create account</h2>
                </div>
                <form onSubmit={handleRegister} style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                  <input value={registerName} required onChange={(e) => setRegisterName(e.target.value)} placeholder="Name" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }} />
                  <input type="email" value={registerEmail} required onChange={(e) => setRegisterEmail(e.target.value)} placeholder="Email" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }} />
                  <input type="password" value={registerPassword} required onChange={(e) => setRegisterPassword(e.target.value)} placeholder="Password (min 6 chars)" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }} />
                  <input type="password" value={registerConfirm} required onChange={(e) => setRegisterConfirm(e.target.value)} placeholder="Confirm password" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }} />
                  <button type="submit" disabled={loading} style={{ width: '100%', padding: 14, borderRadius: 12, background: isDark ? '#fff' : '#000', color: isDark ? '#000' : '#fff', border: 'none', fontSize: 16, cursor: 'pointer', marginTop: 8 }}>{loading ? <Icons.Loader /> : 'Create account'}</button>
                </form>
                <p style={{ textAlign: 'center', marginTop: 16, fontSize: 14, color: styles.textSecondary }}>
                  Already have an account? <button onClick={() => { setShowRegister(false); setShowLogin(true); }} style={{ color: styles.textPrimary, background: 'none', border: 'none', cursor: 'pointer', textDecoration: 'underline' }}>Sign in</button>
                </p>
              </div>
            </div>
          )}
          
          {/* Verification Modal */}
          {showVerification && (
            <div className="modal-overlay" onClick={() => setShowVerification(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowVerification(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Verify your email</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Enter the 6-digit code</p>
                </div>
                <input value={verificationInput} onChange={(e) => setVerificationInput(e.target.value.replace(/\D/g, '').slice(0, 6))} placeholder="000000" maxLength={6} style={{ width: '100%', padding: 16, borderRadius: 12, textAlign: 'center', fontSize: 28, letterSpacing: '0.5em', border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, color: isDark ? '#fff' : '#000' }} />
                <button onClick={handleVerify} disabled={verificationInput.length !== 6 || loading} style={{ width: '100%', padding: 14, borderRadius: 12, background: isDark ? '#fff' : '#000', color: isDark ? '#000' : '#fff', border: 'none', fontSize: 16, marginTop: 16, cursor: 'pointer', opacity: verificationInput.length !== 6 ? 0.5 : 1 }}>{loading ? <Icons.Loader /> : 'Verify'}</button>
              </div>
            </div>
          )}
          
          {/* Forgot Password Modal */}
          {showForgotPassword && (
            <div className="modal-overlay" onClick={() => setShowForgotPassword(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowForgotPassword(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Recover Account</h2>
                  <p style={{ color: styles.textSecondary, marginTop: 4 }}>Enter your email</p>
                </div>
                <input type="email" value={recoveryEmail} required onChange={(e) => setRecoveryEmail(e.target.value)} placeholder="Email" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000' }} />
                <button onClick={async () => {
                  if (!recoveryEmail) { toast('Error', 'Please enter your email', 'error'); return; }
                  setLoading(true);
                  try {
                    const result = await api.checkEmail(recoveryEmail);
                    if (result.success && result.exists) {
                      const code = Math.floor(100000 + Math.random() * 900000).toString();
                      setRecoveryCode(code);
                      if (window.emailjs) {
                        await window.emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, { to_email: recoveryEmail, verification_code: code });
                        setShowForgotPassword(false);
                        setShowResetPassword(true);
                        toast('Code Sent', 'Check your email', 'success');
                      }
                    } else {
                      toast('Error', 'Email not found', 'error');
                    }
                  } catch (e) {
                    toast('Error', 'Failed to send email', 'error');
                  } finally { setLoading(false); }
                }} disabled={loading || !recoveryEmail} style={{ width: '100%', padding: 14, borderRadius: 12, background: isDark ? '#fff' : '#000', color: isDark ? '#000' : '#fff', border: 'none', fontSize: 16, marginTop: 16, cursor: 'pointer' }}>{loading ? <Icons.Loader /> : 'Send Code'}</button>
              </div>
            </div>
          )}
          
          {/* Reset Password Modal */}
          {showResetPassword && (
            <div className="modal-overlay" onClick={() => setShowResetPassword(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowResetPassword(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Reset Password</h2>
                </div>
                <input value={recoveryCodeInput} onChange={(e) => setRecoveryCodeInput(e.target.value.replace(/\D/g, '').slice(0, 6))} placeholder="Code" maxLength={6} style={{ width: '100%', padding: 12, borderRadius: 12, textAlign: 'center', fontSize: 24, letterSpacing: '0.3em', border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, color: isDark ? '#fff' : '#000' }} />
                <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)} placeholder="New Password" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000', marginTop: 12 }} />
                <input type="password" value={newPasswordConfirm} onChange={(e) => setNewPasswordConfirm(e.target.value)} placeholder="Confirm Password" style={{ width: '100%', padding: 12, borderRadius: 12, border: `1px solid ${styles.borderColor}`, background: styles.bgSecondary, fontSize: 16, color: isDark ? '#fff' : '#000', marginTop: 12 }} />
                <button onClick={async () => {
                  if (recoveryCodeInput !== recoveryCode) { toast('Error', 'Invalid code', 'error'); return; }
                  if (newPassword.length < 6) { toast('Error', 'Password too short', 'error'); return; }
                  if (newPassword !== newPasswordConfirm) { toast('Error', 'Passwords do not match', 'error'); return; }
                  setLoading(true);
                  try {
                    const result = await api.resetPassword(recoveryEmail, newPassword);
                    if (result.success) {
                      toast('Success', 'Password reset!', 'success');
                      setShowResetPassword(false);
                      setShowLogin(true);
                    } else { toast('Error', result.error, 'error'); }
                  } catch (e) { toast('Error', 'Failed', 'error'); }
                  finally { setLoading(false); }
                }} disabled={loading || recoveryCodeInput.length !== 6 || !newPassword || !newPasswordConfirm} style={{ width: '100%', padding: 14, borderRadius: 12, background: isDark ? '#fff' : '#000', color: isDark ? '#000' : '#fff', border: 'none', fontSize: 16, marginTop: 16, cursor: 'pointer' }}>{loading ? <Icons.Loader /> : 'Reset'}</button>
              </div>
            </div>
          )}
          
          {/* Profile Modal */}
          {showProfile && (
            <div className="modal-overlay" onClick={() => setShowProfile(false)}>
              <div className="modal" style={{ '--modal-bg': isDark ? '#111' : '#fff' }} onClick={(e) => e.stopPropagation()}>
                <button onClick={() => setShowProfile(false)} style={{ position: 'absolute', top: 16, right: 16, background: 'none', border: 'none', cursor: 'pointer', color: styles.textPrimary }}><Icons.XLarge /></button>
                <div style={{ textAlign: 'center', marginBottom: 24 }}>
                  <h2 style={{ fontSize: 20, fontWeight: 600 }}>Profile</h2>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <p style={{ marginBottom: 8 }}><strong>Email:</strong> {currentUser?.email}</p>
                  <p><strong>Name:</strong> {currentUser?.name || currentUser?.username}</p>
                </div>
                <button onClick={() => { setShowProfile(false); handleLogout(); }} style={{ width: '100%', padding: 14, borderRadius: 12, background: '#ef4444', color: '#fff', border: 'none', fontSize: 16, marginTop: 24, cursor: 'pointer' }}>Log out</button>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    // Render App with Toast Provider
    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );
  </script>
</body>
</html>
